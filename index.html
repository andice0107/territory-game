<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>領地爭奪戰 PRO - 2026 指揮官監控版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; color: #1e293b; margin: 0; padding: 0; overflow: hidden; }
        .territory-cell { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; stroke: #fff; stroke-width: 2px; }
        .territory-cell:hover { filter: brightness(1.1); transform: scale(1.1); }
        
        /* Player Color System */
        .p-1-bg { background-color: #ff4d6d; } .p-1-color { fill: #ff4d6d; }
        .p-2-bg { background-color: #3b82f6; } .p-2-color { fill: #3b82f6; }
        .p-3-bg { background-color: #10b981; } .p-3-color { fill: #10b981; }
        .p-4-bg { background-color: #f59e0b; } .p-4-color { fill: #f59e0b; }
        .p-5-bg { background-color: #8b5cf6; } .p-5-color { fill: #8b5cf6; }
        .p-6-bg { background-color: #ec4899; } .p-6-color { fill: #ec4899; }
        .p-7-bg { background-color: #06b6d4; } .p-7-color { fill: #06b6d4; }
        .p-8-bg { background-color: #64748b; } .p-8-color { fill: #64748b; }
        
        .tian-zi-ge { position: relative; background-color: #fff; box-shadow: inset 0 0 0 6px #1e293b; border-radius: 4px; }
        .writing-guide-cross { position: absolute; inset: 0; pointer-events: none; background-image: linear-gradient(to right, transparent 49.5%, #cbd5e1 50%, transparent 50.5%), linear-gradient(to bottom, transparent 49.5%, #cbd5e1 50%, transparent 50.5%); opacity: 0.8; }
        .full-screen-panel { width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; z-index: 50; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* Animation for Pause Overlay */
        .pause-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }

        /* Student Monitor Cards */
        .monitor-card { transition: all 0.3s ease; border: 4px solid transparent; }
        .monitor-card.active { border-color: #6366f1; transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .monitor-card.hidden-monitor { opacity: 0.4; filter: grayscale(1); }

        /* Locked state styling */
        .locked-tools { opacity: 0.5; pointer-events: none; filter: grayscale(1); }
    </style>
</head>
<body class="min-h-screen overflow-hidden bg-slate-50 font-black">

    <div id="entry-screen" class="full-screen-panel bg-slate-900 flex flex-col items-center justify-center p-6 z-[200]">
        <div class="text-center space-y-12 w-full max-w-4xl">
            <h1 class="text-7xl font-black text-white italic">領地爭奪 <span class="text-indigo-500 uppercase">Battle</span></h1>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 px-4">
                <button onclick="window.switchRole('teacher')" class="bg-white/5 border-2 border-white/10 p-12 rounded-[3rem] hover:bg-white hover:text-slate-900 transition-all flex flex-col items-center gap-6 group shadow-2xl">
                    <i data-lucide="graduation-cap" class="w-20 h-20 text-indigo-500 group-hover:rotate-12 transition-transform"></i>
                    <div class="text-4xl uppercase italic">我是教師</div>
                </button>
                <button onclick="window.switchRole('student')" class="bg-white/5 border-2 border-white/10 p-12 rounded-[3rem] hover:bg-white hover:text-slate-900 transition-all flex flex-col items-center gap-6 group shadow-2xl">
                    <i data-lucide="sword" class="w-20 h-20 text-emerald-500 group-hover:-rotate-12 transition-transform"></i>
                    <div class="text-4xl uppercase italic">我是學生</div>
                </button>
            </div>
        </div>
    </div>

    <div id="teacher-setup-screen" class="hidden full-screen-panel bg-white text-slate-900 flex flex-col">
        <header class="p-4 border-b-2 border-slate-200 flex justify-between items-center bg-white z-10">
            <h2 class="text-2xl font-black italic">司令部 <span class="text-indigo-600 uppercase">Lobby</span></h2>
            <div id="join-stats-header" class="bg-indigo-600 text-white px-5 py-1.5 rounded-full text-sm font-black uppercase italic font-black">已報到: 0 人</div>
            <button onclick="location.reload()" class="text-slate-400 hover:text-rose-500"><i data-lucide="x-circle" class="w-8 h-8"></i></button>
        </header>
        <div class="flex-1 flex overflow-hidden">
            <div class="w-[320px] bg-slate-50 border-r p-6 space-y-6 overflow-y-auto custom-scrollbar">
                <div class="bg-white p-4 rounded-3xl shadow-lg text-center border">
                    <h3 class="font-black text-xs text-slate-400 mb-2 italic uppercase">加入 QRCode</h3>
                    <div class="bg-white aspect-square rounded-xl flex items-center justify-center mb-4 border-2 border-dashed">
                        <canvas id="qr-canvas" class="w-full h-full"></canvas>
                    </div>
                    <button onclick="window.copyJoinLink()" class="w-full py-2.5 bg-slate-900 text-white rounded-lg font-black text-sm">複製連結</button>
                </div>
                <div class="space-y-4">
                    <label class="block text-xs font-black uppercase text-slate-400 italic">模式</label>
                    <select id="t-battle-mode" class="w-full p-3 rounded-xl border-2 font-black outline-none bg-white">
                        <option value="sync">教師導航 (同步控制)</option>
                        <option value="self" selected>勇者自主 (各自挑戰)</option>
                    </select>
                </div>
            </div>
            <div class="flex-1 p-8 flex flex-col overflow-hidden">
                <h3 class="text-xl font-black italic mb-6 flex items-center gap-2"><i data-lucide="scroll-text" class="text-indigo-600"></i>任務配置清單</h3>
                <div id="question-list" class="flex-1 space-y-3 overflow-y-auto pr-4 custom-scrollbar"></div>
                <div class="flex gap-2 mt-4">
                    <button onclick="window.addQuestionRow('hand')" class="bg-indigo-600 text-white px-6 py-3 rounded-xl font-black text-xs shadow-md">+ 手寫</button>
                    <button onclick="window.addQuestionRow('choice')" class="bg-emerald-600 text-white px-6 py-3 rounded-xl font-black text-xs shadow-md">+ 選擇</button>
                    <button onclick="window.addQuestionRow('boolean')" class="bg-amber-500 text-white px-6 py-3 rounded-xl font-black text-xs shadow-md">+ 是非</button>
                </div>
            </div>
            <div class="w-[280px] bg-slate-100 border-l p-6 overflow-y-auto custom-scrollbar">
                <h3 class="font-black text-xs uppercase text-slate-400 mb-4 flex justify-between italic">勇者候命區 <span id="ready-count" class="text-indigo-600">0</span></h3>
                <div id="teacher-lobby-list" class="space-y-3"></div>
            </div>
        </div>
        <div class="p-6 border-t-2 bg-white">
            <button onclick="window.handleTeacherInit()" id="start-battle-btn" class="w-full bg-slate-900 text-white font-black py-5 rounded-2xl text-2xl uppercase italic shadow-xl disabled:opacity-20 transition-all">啟動戰鬥</button>
        </div>
    </div>

    <div id="player-select-screen" class="hidden full-screen-panel bg-slate-900 flex flex-col items-center justify-center p-6 z-[65]">
        <div class="max-w-md w-full bg-white p-10 rounded-[4rem] shadow-2xl text-center space-y-8 relative border-[12px] border-slate-800">
            <div id="student-entry-form" class="space-y-8">
                <h2 class="text-4xl font-black italic uppercase text-slate-900">勇者登錄</h2>
                <input type="text" id="user-name-input" maxlength="10" placeholder="您的戰鬥代號..." class="w-full border-b-4 border-slate-100 p-4 text-center text-3xl font-black outline-none focus:border-indigo-600 text-slate-900">
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="window.chooseHand('left')" id="hand-left-btn" type="button" class="p-6 border-4 border-slate-100 rounded-3xl flex flex-col items-center gap-2 transition-all group">
                        <i data-lucide="hand" class="w-12 h-12 -scale-x-100 text-slate-300 group-hover:text-indigo-500"></i>
                        <span class="font-black text-slate-900">左撇子</span>
                    </button>
                    <button onclick="window.chooseHand('right')" id="hand-right-btn" type="button" class="p-6 border-4 border-indigo-500 bg-indigo-50 rounded-3xl flex flex-col items-center gap-2 transition-all">
                        <i data-lucide="hand" class="w-12 h-12 text-indigo-500"></i>
                        <span class="font-black text-slate-900">右撇子</span>
                    </button>
                </div>
                <button id="student-confirm-btn" onclick="window.confirmStudentName()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black text-xl shadow-xl hover:bg-black">確認部署</button>
            </div>
            <div id="student-wait-hint" class="hidden py-12 space-y-6">
                <div class="w-20 h-20 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto animate-bounce">
                    <i data-lucide="clock" class="w-10 h-10"></i>
                </div>
                <h2 class="text-3xl font-black text-slate-900 italic">已成功就位</h2>
                <p class="text-slate-400 font-black animate-pulse uppercase italic">請等待老師啟動戰鬥...</p>
            </div>
        </div>
    </div>

    <div id="game-screen" class="hidden full-screen-panel bg-slate-100 flex overflow-hidden">
        
        <!-- Pause Overlay -->
        <div id="pause-overlay" class="hidden absolute inset-0 bg-slate-900/80 z-[100] flex flex-col items-center justify-center text-white text-center p-6">
            <i data-lucide="pause-circle" class="w-32 h-32 mb-8 pause-pulse text-indigo-400"></i>
            <h2 class="text-6xl font-black italic uppercase tracking-tighter">Battle On Hold</h2>
            <p class="text-xl mt-4 text-slate-400 font-bold">老師正在進行重要說明，請稍候...</p>
        </div>

        <div id="sidebar-info" class="w-1/4 bg-white border-r-2 border-slate-200 p-6 flex flex-col gap-6 shadow-xl z-20">
            <!-- User Status Card -->
            <div id="student-info-panel" class="bg-slate-900 p-5 rounded-[2rem] text-white shadow-md">
                <div class="flex items-center gap-4">
                    <div id="my-color-preview" class="w-14 h-14 rounded-full border-4 border-white/10"></div>
                    <div class="flex-1">
                        <div id="my-name-display" class="text-xl font-black uppercase truncate italic">勇者</div>
                        <div id="game-progress" class="text-xs text-indigo-400 font-black mt-1 uppercase italic">SCORE: 0</div>
                    </div>
                </div>
            </div>

            <!-- Teacher Controls (Sidebar part) -->
            <div id="teacher-sidebar-tools" class="hidden space-y-4">
                <button onclick="window.toggleAllMonitors(true)" class="w-full bg-slate-800 text-white py-4 rounded-2xl font-black text-sm flex items-center justify-center gap-2">
                    <i data-lucide="eye" class="w-4 h-4"></i> 全部顯示
                </button>
                <button onclick="window.toggleAllMonitors(false)" class="w-full bg-slate-200 text-slate-600 py-4 rounded-2xl font-black text-sm flex items-center justify-center gap-2">
                    <i data-lucide="eye-off" class="w-4 h-4"></i> 全部遮蔽
                </button>
                <button id="pause-btn" onclick="window.togglePause()" class="w-full bg-rose-600 text-white py-6 rounded-3xl font-black text-xl shadow-xl flex flex-col items-center">
                    <span id="pause-text">暫停戰鬥</span>
                    <span class="text-[10px] opacity-70">全班作答凍結</span>
                </button>
            </div>

            <!-- Strategic Map -->
            <div class="flex-1 bg-white/50 rounded-[2.5rem] p-6 flex flex-col items-center justify-center border-2 border-white shadow-inner relative overflow-hidden">
                <h4 class="absolute top-4 w-full text-center text-[10px] font-black text-slate-400 uppercase italic">戰略圖預覽</h4>
                <div class="w-full max-w-[180px]">
                    <svg id="board-svg-mini" viewBox="0 0 550 550" class="w-full h-auto drop-shadow-lg"></svg>
                </div>
                <button onclick="window.openFullMap()" class="absolute bottom-4 text-[10px] text-indigo-600 font-black flex items-center gap-1">
                    <i data-lucide="maximize" class="w-3 h-3"></i> 放大地圖
                </button>
            </div>
        </div>

        <div id="main-canvas-area" class="flex-1 flex flex-col bg-slate-100 relative">
            
            <!-- TEACHER VIEW: Monitoring Wall -->
            <div id="teacher-monitoring-wall" class="hidden absolute inset-0 z-40 p-8 overflow-y-auto custom-scrollbar flex flex-col">
                <div class="flex justify-between items-center mb-8">
                    <h3 class="text-4xl font-black italic uppercase tracking-tighter">戰略監控牆 <span class="text-indigo-600 text-sm ml-4 italic">Live Intelligence</span></h3>
                </div>
                <div id="monitor-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 flex-1 items-start">
                    <!-- Monitor cards will be injected here -->
                </div>
            </div>

            <!-- STUDENT VIEW: Answer Area -->
            <div id="student-answer-area" class="p-10 h-full flex flex-col">
                <div class="mb-6 flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <span id="q-type-label" class="bg-slate-900 text-white text-xs font-black px-6 py-2 rounded-full uppercase italic">MISSION</span>
                        <span id="player-identity-tag" class="text-indigo-600 text-3xl font-black italic">勇者: [未知]</span>
                    </div>
                    <span id="q-index-label" class="text-slate-300 text-7xl font-black italic tracking-tighter">#01</span>
                </div>
                <div id="q-content-text" class="font-black text-slate-900 italic uppercase mb-10 flex items-center justify-center text-center text-5xl" style="flex: 0 0 120px;">正在通訊同步...</div>
                
                <div class="flex-1 flex items-center justify-center relative">
                    <!-- Handwriting Interface -->
                    <div id="handwriting-area" class="hidden w-full h-full flex items-center">
                        <div id="handwriting-sub-container" class="w-full h-full flex items-center">
                            <div id="canvas-tools" class="flex flex-col gap-3 w-48">
                                <button onclick="window.setTool('pen')" id="tool-pen" class="w-full bg-indigo-600 text-white py-5 rounded-3xl shadow-lg border-4 border-indigo-300 font-black">黑筆</button>
                                <button onclick="window.setTool('eraser')" class="w-full bg-slate-200 text-slate-500 py-5 rounded-3xl font-black">橡皮擦</button>
                                <button onclick="window.clearCanvas()" class="w-full bg-slate-200 text-slate-500 py-5 rounded-3xl font-black">清空</button>
                                <button onclick="window.submitHandwriting()" class="w-full bg-emerald-600 text-white py-8 rounded-[2.5rem] text-4xl font-black shadow-2xl mt-4">傳送</button>
                            </div>
                            <div id="canvas-container-outer" class="relative ml-auto">
                                <div id="canvas-container" class="tian-zi-ge w-[500px] h-[500px] shadow-2xl relative overflow-hidden bg-white">
                                    <div class="writing-guide-cross"></div>
                                    <canvas id="writing-canvas" width="500" height="500" class="absolute top-0 left-0 cursor-crosshair z-10 touch-none"></canvas>
                                    <!-- Teacher's remote ink layer for students -->
                                    <canvas id="remote-ink-canvas" width="500" height="500" class="absolute top-0 left-0 pointer-events-none z-20"></canvas>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- Choice Interface -->
                    <div id="choice-area" class="hidden w-full max-w-4xl grid grid-cols-1 gap-4">
                        <div id="options-container" class="grid grid-cols-1 gap-4"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Teacher Collaboration Modal -->
    <div id="collab-modal" class="hidden fixed inset-0 bg-slate-900/95 backdrop-blur-md z-[300] flex items-center justify-center p-8">
        <div class="w-full max-w-6xl flex gap-12 items-center">
            <div class="flex-1">
                <div class="bg-white rounded-3xl overflow-hidden shadow-2xl relative border-8 border-slate-700" style="width: 700px; height: 700px;">
                    <!-- Student's current drawing backgrounded -->
                    <img id="collab-student-ink" class="absolute inset-0 w-full h-full opacity-40 pointer-events-none">
                    <canvas id="collab-canvas" width="700" height="700" class="relative z-10 cursor-crosshair"></canvas>
                </div>
            </div>
            <div class="w-80 space-y-6">
                <div class="text-white">
                    <h3 class="text-4xl font-black italic" id="collab-name">指導中...</h3>
                    <p class="text-slate-400 font-bold uppercase mt-2">協作畫板</p>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="window.setCollabPen('#ef4444')" class="bg-rose-600 text-white p-6 rounded-2xl font-black text-2xl">紅筆</button>
                    <button onclick="window.setCollabPen('#3b82f6')" class="bg-blue-600 text-white p-6 rounded-2xl font-black text-2xl">藍筆</button>
                </div>
                <button onclick="window.setCollabPen('eraser')" class="w-full bg-slate-200 text-slate-800 py-4 rounded-2xl font-black">橡皮擦</button>
                <div class="h-8"></div>
                <button id="lock-student-btn" onclick="window.toggleStudentLock()" class="w-full bg-amber-600 text-white py-6 rounded-3xl font-black text-xl shadow-xl flex items-center justify-center gap-2">
                    <i data-lucide="lock" class="w-6 h-6"></i> 鎖定畫筆
                </button>
                <button onclick="window.closeCollab()" class="w-full bg-rose-600 text-white py-6 rounded-3xl font-black text-xl shadow-xl">
                    結束指導
                </button>
            </div>
        </div>
    </div>

    <!-- Full Map Modal -->
    <div id="map-modal" class="hidden fixed inset-0 bg-slate-900/90 z-[400] flex flex-col items-center justify-center p-10">
        <h2 class="text-5xl font-black text-white italic mb-10 uppercase">戰略全景圖</h2>
        <div class="w-full max-w-[800px]">
            <svg id="board-svg-main" viewBox="0 0 550 550" class="w-full h-auto drop-shadow-2xl"></svg>
        </div>
        <button onclick="document.getElementById('map-modal').classList.add('hidden')" class="mt-12 bg-white px-12 py-4 rounded-full font-black text-2xl">返回戰場</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, arrayUnion, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBBIi6sw-wUzp-Jxc3dXJhl5DZ3-6LMe-o", authDomain: "my-handwriting-tool.firebaseapp.com", projectId: "my-handwriting-tool", storageBucket: "my-handwriting-tool.firebasestorage.app", messagingSenderId: "649810632937", appId: "1:649810632937:web:085f7e5c8f5290d6da9078" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        const SYNC_ID = 'TW-2026-BATTLE-COMMAND-V1';

        let role = null, user = null, gameState = null, currentPlayerId = null, handPref = 'right';
        let currentTool = 'pen', collabPenColor = '#ef4444', collabTargetId = null;

        window.mountGlobals = function() {
            Object.assign(window, {
                switchRole: async (r) => {
                    role = r;
                    document.getElementById('entry-screen').classList.add('hidden');
                    
                    if(role === 'teacher') {
                        document.getElementById('teacher-setup-screen').classList.remove('hidden');
                        document.getElementById('teacher-monitoring-wall').classList.remove('hidden');
                        document.getElementById('student-answer-area').classList.add('hidden');
                        document.getElementById('teacher-sidebar-tools').classList.remove('hidden');
                        
                        QRCode.toCanvas(document.getElementById('qr-canvas'), window.location.href, { width: 250, margin: 1 });
                        
                        await setDoc(doc(db, 'artifacts', SYNC_ID), { 
                            status: 'lobby', 
                            lobbyPlayers: [], 
                            players: [],
                            paused: false,
                            lastUpdate: Date.now() 
                        }, { merge: true });

                        // Default Questions
                        window.addQuestionRow('hand', '戰：請寫出挑戰之戰的戰字');
                        window.addQuestionRow('choice', '2026年是哪一個生肖年？', '龍,蛇,馬,羊', '馬');
                        window.addQuestionRow('boolean', '我們正在進行領地爭奪戰嗎？', '', '是');
                    } else {
                        document.getElementById('player-select-screen').classList.remove('hidden');
                        document.getElementById('student-answer-area').classList.remove('hidden');
                        document.getElementById('teacher-monitoring-wall').classList.add('hidden');
                    }

                    // Main State Sync
                    onSnapshot(doc(db, 'artifacts', SYNC_ID), (ds) => {
                        if(ds.exists()) {
                            const data = ds.data();
                            const prevStatus = gameState?.status;
                            gameState = data;
                            window.syncUI();
                            
                            if(data.status === 'playing' && prevStatus !== 'playing') {
                                window.switchToGameUI();
                            }
                        }
                    });
                },

                syncUI: () => {
                    if(!gameState) return;
                    
                    // Update Join Stats
                    const lobby = gameState.lobbyPlayers || [];
                    document.getElementById('ready-count').innerText = lobby.length;
                    document.getElementById('join-stats-header').innerText = `已報到: ${lobby.length} 人`;
                    
                    if(role === 'teacher') {
                        document.getElementById('teacher-lobby-list').innerHTML = lobby.map(p => `
                            <div class="bg-white p-3 rounded-xl border flex items-center gap-3 shadow-sm font-black text-slate-800">
                                <div class="w-3 h-3 rounded-full bg-indigo-500"></div>
                                <span>${p.name}</span>
                            </div>
                        `).join('');

                        // Update Monitoring Wall
                        if(gameState.status === 'playing') {
                            window.renderMonitorWall();
                        }
                    }

                    // Pause State Sync
                    const pauseOverlay = document.getElementById('pause-overlay');
                    if(gameState.paused) pauseOverlay.classList.remove('hidden');
                    else pauseOverlay.classList.add('hidden');

                    if(role === 'student' && currentPlayerId) {
                        const me = gameState.players.find(p => p.id === currentPlayerId);
                        if(me) {
                            // Sync Brush Lock
                            const tools = document.getElementById('canvas-tools');
                            const canvas = document.getElementById('writing-canvas');
                            if(me.locked) {
                                tools.classList.add('locked-tools');
                                canvas.classList.add('locked-tools');
                            } else {
                                tools.classList.remove('locked-tools');
                                canvas.classList.remove('locked-tools');
                            }
                            // Sync Remote Ink
                            if(me.collabInk) window.drawRemoteInk(me.collabInk);
                        }
                    }

                    window.renderMapUI();
                },

                renderMonitorWall: () => {
                    const grid = document.getElementById('monitor-grid');
                    const players = gameState.players || [];
                    grid.innerHTML = players.map(p => `
                        <div class="monitor-card bg-white p-4 rounded-[2rem] shadow-sm flex flex-col gap-3 ${p.monitorHidden ? 'hidden-monitor' : ''} ${p.locked ? 'active' : ''}">
                            <div class="flex justify-between items-center px-2">
                                <div class="flex items-center gap-2">
                                    <div class="w-4 h-4 rounded-full ${p.bgClass}"></div>
                                    <span class="font-black text-sm uppercase">${p.name}</span>
                                </div>
                                <div class="flex gap-1">
                                    <button onclick="window.toggleSingleMonitor('${p.id}')" class="p-2 bg-slate-100 rounded-lg"><i data-lucide="${p.monitorHidden ? 'eye-off' : 'eye'}" class="w-3 h-3"></i></button>
                                    <button onclick="window.openCollab('${p.id}', '${p.name}')" class="p-2 bg-indigo-600 text-white rounded-lg text-[10px]">指導</button>
                                </div>
                            </div>
                            <div class="aspect-square bg-slate-50 rounded-2xl overflow-hidden border border-slate-100 flex items-center justify-center relative">
                                ${p.monitorHidden ? '<i data-lucide="shield-alert" class="w-12 h-12 text-slate-300"></i>' : `<img src="${p.ink || ''}" class="max-w-full max-h-full">`}
                                ${p.locked ? '<div class="absolute top-2 right-2 bg-amber-500 text-white px-2 py-0.5 rounded text-[8px] italic uppercase">Locked</div>' : ''}
                            </div>
                        </div>
                    `).join('');
                    lucide.createIcons();
                },

                chooseHand: (h) => {
                    handPref = h;
                    const gameScreen = document.getElementById('game-screen');
                    const sub = document.getElementById('handwriting-sub-container');
                    const outer = document.getElementById('canvas-container-outer');
                    
                    if(h === 'left') {
                        gameScreen.style.flexDirection = 'row-reverse';
                        sub.style.flexDirection = 'row-reverse';
                        outer.style.marginLeft = '0';
                        outer.style.marginRight = 'auto';
                        outer.classList.remove('ml-auto');
                    } else {
                        gameScreen.style.flexDirection = 'row';
                        sub.style.flexDirection = 'row';
                        outer.style.marginLeft = 'auto';
                        outer.style.marginRight = '0';
                        outer.classList.add('ml-auto');
                    }
                    document.getElementById('hand-left-btn').classList.toggle('border-indigo-500', h==='left');
                    document.getElementById('hand-right-btn').classList.toggle('border-indigo-500', h==='right');
                },

                handleTeacherInit: async () => {
                    const lobby = gameState?.lobbyPlayers || [];
                    if(lobby.length === 0) return;
                    
                    const btn = document.getElementById('start-battle-btn');
                    btn.disabled = true; btn.innerText = "戰場生成中...";

                    const qs = [];
                    document.querySelectorAll('#question-list > div').forEach(el => {
                        qs.push({
                            type: el.querySelector('.q-type').value,
                            content: el.querySelector('.q-content').value,
                            answer: el.querySelector('.q-ans')?.value || ''
                        });
                    });

                    const ps = lobby.map((lp, i) => ({
                        id: lp.id, name: lp.name, score: 0, 
                        bgClass: `p-${(i%8)+1}-bg`, colorClass: `p-${(i%8)+1}-color`,
                        ink: '', collabInk: '', monitorHidden: false, locked: false
                    }));

                    await updateDoc(doc(db, 'artifacts', SYNC_ID), {
                        status: 'playing',
                        questions: qs,
                        players: ps,
                        curQ: 0,
                        cells: window.generateCells(ps),
                        lastUpdate: Date.now()
                    });
                },

                togglePause: async () => {
                    const isPaused = !gameState.paused;
                    await updateDoc(doc(db, 'artifacts', SYNC_ID), { paused: isPaused });
                    document.getElementById('pause-text').innerText = isPaused ? "繼續戰鬥" : "暫停戰鬥";
                },

                toggleAllMonitors: async (show) => {
                    const ups = gameState.players.map(p => ({ ...p, monitorHidden: !show }));
                    await updateDoc(doc(db, 'artifacts', SYNC_ID), { players: ups });
                },

                toggleSingleMonitor: async (sid) => {
                    const ups = gameState.players.map(p => {
                        if(p.id === sid) p.monitorHidden = !p.monitorHidden;
                        return p;
                    });
                    await updateDoc(doc(db, 'artifacts', SYNC_ID), { players: ups });
                },

                openCollab: (sid, name) => {
                    collabTargetId = sid;
                    document.getElementById('collab-name').innerText = name;
                    document.getElementById('collab-modal').classList.remove('hidden');
                    const target = gameState.players.find(p => p.id === sid);
                    document.getElementById('collab-student-ink').src = target?.ink || '';
                    document.getElementById('lock-student-btn').innerText = target?.locked ? "解鎖畫筆" : "鎖定畫筆";
                    window.initCollabCanvas();
                },

                closeCollab: async () => {
                    // Auto unlock and clear collab ink
                    const ups = gameState.players.map(p => {
                        if(p.id === collabTargetId) {
                            p.locked = false;
                            p.collabInk = '';
                        }
                        return p;
                    });
                    await updateDoc(doc(db, 'artifacts', SYNC_ID), { players: ups });
                    document.getElementById('collab-modal').classList.add('hidden');
                    collabTargetId = null;
                },

                toggleStudentLock: async () => {
                    const ups = gameState.players.map(p => {
                        if(p.id === collabTargetId) p.locked = !p.locked;
                        return p;
                    });
                    await updateDoc(doc(db, 'artifacts', SYNC_ID), { players: ups });
                    const me = ups.find(p => p.id === collabTargetId);
                    document.getElementById('lock-student-btn').innerText = me.locked ? "解鎖畫筆" : "鎖定畫筆";
                },

                initCanvas: () => {
                    const c = document.getElementById('writing-canvas');
                    if(!c) return;
                    const ctx = c.getContext('2d');
                    ctx.lineWidth = 14; ctx.lineCap = 'round'; ctx.strokeStyle = '#1e293b';
                    let dr = false;
                    const gxy = (e) => {
                        const r = c.getBoundingClientRect();
                        const x = e.touches ? e.touches[0].clientX : e.clientX;
                        const y = e.touches ? e.touches[0].clientY : e.clientY;
                        return [x - r.left, y - r.top];
                    };
                    c.onmousedown = (e) => { if(window.isMyBoardLocked()) return; dr = true; const [x,y] = gxy(e); ctx.beginPath(); ctx.moveTo(x,y); };
                    c.ontouchstart = (e) => { if(window.isMyBoardLocked()) return; dr = true; const [x,y] = gxy(e); ctx.beginPath(); ctx.moveTo(x,y); e.preventDefault(); };
                    window.onmousemove = (e) => { if(!dr) return; const [x,y] = gxy(e); ctx.lineTo(x,y); ctx.stroke(); window.syncInk(); };
                    window.ontouchmove = (e) => { if(!dr) return; const [x,y] = gxy(e); ctx.lineTo(x,y); ctx.stroke(); e.preventDefault(); window.syncInk(); };
                    window.onmouseup = () => { if(dr) { dr = false; window.syncInk(true); } };
                    window.ontouchend = () => { if(dr) { dr = false; window.syncInk(true); } };
                },

                syncInk: async (force = false) => {
                    if(role !== 'student') return;
                    // Debounce or force update
                    const c = document.getElementById('writing-canvas');
                    const data = c.toDataURL('image/webp', 0.1);
                    const ups = gameState.players.map(p => {
                        if(p.id === currentPlayerId) p.ink = data;
                        return p;
                    });
                    // Only update DB on mouseup or every 500ms to save bandwidth
                    if(force) {
                        await updateDoc(doc(db, 'artifacts', SYNC_ID), { players: ups });
                    }
                },

                isMyBoardLocked: () => {
                    const me = gameState.players.find(p => p.id === currentPlayerId);
                    return me?.locked || gameState.paused;
                },

                generateCells: (ps) => {
                    const cells = [];
                    for(let i=0; i<30; i++) {
                        const angle = (Math.PI * 2 / 30) * i;
                        const r = 150 + Math.random() * 80;
                        cells.push({
                            id: i,
                            x: 275 + r * Math.cos(angle),
                            y: 275 + r * Math.sin(angle),
                            owner: null
                        });
                    }
                    return cells;
                },

                renderMapUI: () => {
                    const mini = document.getElementById('board-svg-mini');
                    const main = document.getElementById('board-svg-main');
                    [mini, main].forEach(svg => {
                        if(!svg) return;
                        svg.innerHTML = '';
                        if(gameState?.cells) {
                            gameState.cells.forEach(c => {
                                const cir = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                                cir.setAttribute("cx", c.x); cir.setAttribute("cy", c.y); cir.setAttribute("r", "10");
                                const owner = gameState.players.find(p => p.id === c.owner);
                                cir.setAttribute("fill", owner ? window.getHex(owner.colorClass) : "#cbd5e1");
                                cir.classList.add('territory-cell');
                                svg.appendChild(cir);
                            });
                        }
                    });
                },

                getHex: (cls) => {
                    const map = { 'p-1-color': '#ff4d6d', 'p-2-color': '#3b82f6', 'p-3-color': '#10b981', 'p-4-color': '#f59e0b', 'p-5-color': '#8b5cf6', 'p-6-color': '#ec4899', 'p-7-color': '#06b6d4', 'p-8-color': '#64748b' };
                    return map[cls] || '#cbd5e1';
                },

                addQuestionRow: (type, content='', answer='') => {
                    const container = document.getElementById('question-list');
                    if(!container) return;
                    const div = document.createElement('div');
                    div.className = "bg-white p-4 rounded-2xl border-2 flex items-center gap-4";
                    div.innerHTML = `<span class="bg-slate-900 text-white px-2 py-0.5 rounded text-[8px] uppercase">${type}</span><input type="text" class="q-content flex-1 text-sm font-black" value="${content}"><input type="hidden" class="q-type" value="${type}"><input type="hidden" class="q-ans" value="${answer}">`;
                    container.appendChild(div);
                },

                confirmStudentName: async () => {
                    const name = document.getElementById('user-name-input').value.trim();
                    if(!name || !user) return;
                    currentPlayerId = user.uid;
                    await updateDoc(doc(db, 'artifacts', SYNC_ID), { lobbyPlayers: arrayUnion({ id: currentPlayerId, name }) });
                    document.getElementById('student-entry-form').classList.add('hidden');
                    document.getElementById('student-wait-hint').classList.remove('hidden');
                },

                switchToGameUI: () => {
                    document.getElementById('teacher-setup-screen').classList.add('hidden');
                    document.getElementById('player-select-screen').classList.add('hidden');
                    document.getElementById('game-screen').classList.remove('hidden');
                    if(role === 'student') {
                        const me = gameState.players.find(p => p.id === currentPlayerId);
                        document.getElementById('my-name-display').innerText = me?.name || '勇者';
                        document.getElementById('my-color-preview').className = `w-14 h-14 rounded-full border-4 border-white/10 ${me?.bgClass}`;
                        window.initCanvas();
                    }
                },

                drawRemoteInk: (data) => {
                    const canvas = document.getElementById('remote-ink-canvas');
                    if(!canvas) return;
                    const ctx = canvas.getContext('2d');
                    const img = new Image();
                    img.onload = () => {
                        ctx.clearRect(0,0,500,500);
                        ctx.drawImage(img, 0, 0, 500, 500);
                    };
                    img.src = data;
                },

                initCollabCanvas: () => {
                    const c = document.getElementById('collab-canvas');
                    const ctx = c.getContext('2d');
                    ctx.lineWidth = 10; ctx.lineCap = 'round';
                    let dr = false;
                    c.onmousedown = (e) => {
                        dr = true;
                        const r = c.getBoundingClientRect();
                        ctx.beginPath();
                        ctx.moveTo(e.clientX - r.left, e.clientY - r.top);
                    };
                    window.onmousemove = async (e) => {
                        if(!dr || !collabTargetId) return;
                        const r = c.getBoundingClientRect();
                        ctx.strokeStyle = collabPenColor === 'eraser' ? '#fff' : collabPenColor;
                        ctx.globalCompositeOperation = collabPenColor === 'eraser' ? 'destination-out' : 'source-over';
                        ctx.lineTo(e.clientX - r.left, e.clientY - r.top);
                        ctx.stroke();
                        window.syncCollabInk();
                    };
                    window.onmouseup = () => { if(dr) { dr = false; window.syncCollabInk(true); } };
                },

                syncCollabInk: async (force = false) => {
                    if(!collabTargetId) return;
                    const data = document.getElementById('collab-canvas').toDataURL('image/webp', 0.1);
                    const ups = gameState.players.map(p => {
                        if(p.id === collabTargetId) p.collabInk = data;
                        return p;
                    });
                    if(force) await updateDoc(doc(db, 'artifacts', SYNC_ID), { players: ups });
                },

                setCollabPen: (p) => { collabPenColor = p; },
                openFullMap: () => { document.getElementById('map-modal').classList.remove('hidden'); window.renderMapUI(); }
            });
        };

        window.mountGlobals();
        (async function boot() {
            try {
                const userSnap = await signInAnonymously(auth);
                user = userSnap.user;
                lucide.createIcons();
            } catch(e) { console.error(e); }
        })();
    </script>
</body>
</html>
