<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>領地爭奪戰 PRO - 2026 馬年特規版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; color: #0f172a; margin: 0; padding: 0; overflow: hidden; }
        
        .territory-cell { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; stroke: #fff; stroke-width: 2px; }
        .territory-cell:hover { filter: brightness(1.1); transform: scale(1.2); stroke-width: 3px; z-index: 10; }
        
        /* 玩家色彩系統 */
        .p-1-bg { background-color: #f43f5e; } .p-1-color { fill: #f43f5e; }
        .p-2-bg { background-color: #3b82f6; } .p-2-color { fill: #3b82f6; }
        .p-3-bg { background-color: #10b981; } .p-3-color { fill: #10b981; }
        .p-4-bg { background-color: #f59e0b; } .p-4-color { fill: #f59e0b; }
        .p-5-bg { background-color: #8b5cf6; } .p-5-color { fill: #8b5cf6; }
        .p-6-bg { background-color: #ec4899; } .p-6-color { fill: #ec4899; }
        .p-7-bg { background-color: #06b6d4; } .p-7-color { fill: #06b6d4; }
        .p-8-bg { background-color: #64748b; } .p-8-color { fill: #64748b; }

        /* 田字格核心視覺 */
        .tian-zi-ge { position: relative; background-color: #fff; box-shadow: inset 0 0 0 4px #1e293b; border-radius: 4px; overflow: hidden; }
        .writing-guide-cross { position: absolute; inset: 0; pointer-events: none; 
            background-image: 
                linear-gradient(to right, transparent 49.5%, #cbd5e1 50%, transparent 50.5%), 
                linear-gradient(to bottom, transparent 49.5%, #cbd5e1 50%, transparent 50.5%); 
            background-size: 100% 100%; opacity: 0.6; }
        .writing-bg-text { font-family: "KaiTi", "標楷體", serif; color: rgba(0,0,0,0.08); pointer-events: none; user-select: none; 
            display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; font-weight: 900; line-height: 1; }

        .full-screen-panel { width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; z-index: 50; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .locked-interaction { pointer-events: none !important; opacity: 0.5; filter: grayscale(0.5); }
        .locked-canvas { pointer-events: none !important; cursor: not-allowed; }
        
        @keyframes pulse-slow { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .animate-pulse-slow { animation: pulse-slow 3s infinite; }
    </style>
</head>
<body class="min-h-screen bg-slate-50 font-black select-none">

    <!-- 1. 角色選擇入口 -->
    <div id="entry-screen" class="full-screen-panel bg-slate-900 flex flex-col items-center justify-center p-6 z-[200]">
        <div class="text-center space-y-12 w-full max-w-4xl">
            <div class="space-y-2">
                <h1 class="text-7xl font-black text-white italic tracking-tighter">領地爭奪 <span class="text-indigo-500 uppercase">PRO</span></h1>
                <p class="text-indigo-300 text-xl tracking-[0.5em] font-bold">2026 勇者回歸 (馬年特仕)</p>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 px-4">
                <button onclick="window.switchRole('teacher')" class="group bg-white/5 border-2 border-white/10 p-12 rounded-[3rem] hover:bg-white hover:border-indigo-500 transition-all flex flex-col items-center gap-6 shadow-2xl">
                    <i data-lucide="graduation-cap" class="w-20 h-20 text-indigo-400 group-hover:text-indigo-600 transition-colors"></i>
                    <span class="text-4xl font-black text-white group-hover:text-slate-900 uppercase italic">我是老師</span>
                </button>
                <button onclick="window.switchRole('student')" class="group bg-white/5 border-2 border-white/10 p-12 rounded-[3rem] hover:bg-white hover:border-emerald-500 transition-all flex flex-col items-center gap-6 shadow-2xl">
                    <i data-lucide="sword" class="w-20 h-20 text-emerald-400 group-hover:text-emerald-600"></i>
                    <span class="text-4xl font-black text-white group-hover:text-slate-900 uppercase italic">我是學生</span>
                </button>
            </div>
        </div>
    </div>

    <!-- 2. 教師候戰大廳 -->
    <div id="teacher-setup-screen" class="hidden full-screen-panel bg-white text-slate-900 flex flex-col">
        <header class="p-4 border-b-2 border-slate-100 flex justify-between items-center shadow-sm">
            <h2 class="text-2xl font-black italic">司令部 <span class="text-indigo-600">Lobby</span></h2>
            <div id="join-stats-header" class="bg-indigo-600 text-white px-6 py-2 rounded-full text-sm font-black italic">報到人數：0 人</div>
            <button onclick="location.reload()" class="text-slate-300 hover:text-rose-500"><i data-lucide="power" class="w-8 h-8"></i></button>
        </header>
        <div class="flex-1 flex overflow-hidden">
            <div class="w-[340px] bg-slate-50 border-r p-6 space-y-6 overflow-y-auto custom-scrollbar">
                <div class="bg-white p-6 rounded-3xl shadow-lg border border-slate-100 text-center">
                    <h3 class="text-xs text-slate-400 mb-3 italic uppercase tracking-widest">掃描加入戰局</h3>
                    <div class="aspect-square rounded-2xl flex items-center justify-center border-2 border-dashed bg-slate-50 p-2">
                        <canvas id="qr-canvas" class="w-full h-full"></canvas>
                    </div>
                    <button onclick="window.copyJoinLink()" class="mt-4 w-full py-3 bg-slate-900 text-white rounded-xl font-black text-sm hover:bg-black">複製網址</button>
                </div>
                <div class="space-y-4">
                    <label class="block text-xs font-black uppercase text-slate-400 italic">戰鬥模式</label>
                    <select id="t-battle-mode" class="w-full p-4 rounded-2xl border-2 font-black text-slate-900 outline-none focus:border-indigo-500 transition-all">
                        <option value="self" selected>勇者自主 (資源班推薦 - 自由挑戰)</option>
                        <option value="sync">全體同步 (老師統一控制)</option>
                    </select>
                </div>
            </div>
            <div class="flex-1 p-8 flex flex-col overflow-hidden bg-slate-100/30">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-2xl font-black italic flex items-center gap-2"><i data-lucide="scroll-text" class="text-indigo-600"></i>任務配置</h3>
                    <div class="flex gap-2">
                        <button onclick="window.addQuestionRow('hand')" class="bg-indigo-600 text-white px-4 py-2 rounded-xl text-xs shadow-md">+ 手寫</button>
                        <button onclick="window.addQuestionRow('choice')" class="bg-emerald-600 text-white px-4 py-2 rounded-xl text-xs shadow-md">+ 選擇</button>
                        <button onclick="window.addQuestionRow('boolean')" class="bg-amber-500 text-white px-4 py-2 rounded-xl text-xs shadow-md">+ 是非</button>
                    </div>
                </div>
                <div id="question-list" class="flex-1 space-y-3 overflow-y-auto pr-4 custom-scrollbar"></div>
            </div>
            <div class="w-[300px] bg-slate-100 border-l p-6 overflow-y-auto custom-scrollbar">
                <h3 class="font-black text-xs uppercase text-slate-400 mb-4 flex justify-between italic tracking-widest">已就位勇者 <span id="ready-count" class="text-indigo-600">0</span></h3>
                <div id="teacher-lobby-list" class="space-y-3"></div>
            </div>
        </div>
        <div class="p-6 border-t-2 bg-white">
            <button onclick="window.handleTeacherInit()" id="start-battle-btn" class="w-full bg-slate-900 text-white font-black py-6 rounded-3xl text-3xl uppercase italic tracking-[0.2em] shadow-xl disabled:opacity-30 transition-all" disabled>啟 動 戰 鬥</button>
        </div>
    </div>

    <!-- 4. 正式戰場介面 -->
    <div id="game-screen" class="hidden full-screen-panel bg-slate-100 flex overflow-hidden">
        <div id="sidebar-info" class="w-1/4 bg-white border-r-2 border-slate-200 p-6 flex flex-col gap-6 shadow-xl z-20 overflow-y-auto custom-scrollbar">
            <div id="student-info-panel" class="bg-slate-900 p-5 rounded-[2rem] text-white shadow-xl">
                <div class="flex items-center gap-4">
                    <div id="my-color-preview" class="w-14 h-14 rounded-full border-4 border-white/20 shadow-inner"></div>
                    <div class="flex-1">
                        <div id="my-name-display" class="text-xl font-black uppercase truncate italic">勇者</div>
                        <div id="game-progress" class="text-xs text-indigo-400 font-black mt-1 uppercase italic">SCORE: 0</div>
                    </div>
                </div>
            </div>

            <!-- 教師控制 HUD -->
            <div id="teacher-hud" class="hidden bg-indigo-900 p-5 rounded-[2.5rem] text-white space-y-4 shadow-2xl">
                <div class="flex justify-between items-center text-[10px] uppercase italic tracking-widest text-indigo-300">
                    <span>指揮中心</span>
                    <span id="t-total-q-info" class="bg-white/10 px-2 py-0.5 rounded">0 題</span>
                </div>
                <div class="bg-white/5 p-4 rounded-2xl border border-white/10 space-y-3">
                    <div id="t-q-preview-text" class="text-sm font-black italic text-indigo-100 min-h-[40px] leading-tight">載入中...</div>
                    <div class="grid grid-cols-1 gap-2">
                        <button onclick="window.pushSyncQuestion()" class="w-full bg-indigo-500 py-3 rounded-xl text-[10px] font-black uppercase italic shadow-md">同步至全體</button>
                        <button onclick="window.toggleAnswerGuide()" class="w-full bg-amber-500 py-3 rounded-xl text-[10px] font-black uppercase italic shadow-md">公布引導字</button>
                    </div>
                </div>
            </div>

            <!-- 小地圖 -->
            <div class="flex-1 bg-slate-50 rounded-[2.5rem] p-6 flex flex-col items-center justify-center border-2 border-white shadow-inner relative overflow-hidden">
                <h4 class="absolute top-4 w-full text-center text-[10px] font-black text-slate-400 uppercase tracking-widest italic">戰略圖預覽</h4>
                <div class="w-full max-w-[200px] cursor-zoom-in hover:scale-105 transition-transform" onclick="window.openFullMap()">
                    <svg id="board-svg-mini" viewBox="0 0 550 550" class="w-full h-auto drop-shadow-xl"></svg>
                </div>
            </div>
        </div>

        <div id="main-canvas-area" class="flex-1 flex flex-col bg-slate-100 relative overflow-hidden">
            <!-- 監控牆牆 (老師) -->
            <div id="teacher-monitoring-wall" class="hidden absolute inset-0 bg-slate-50 z-30 p-8 overflow-y-auto custom-scrollbar">
                <div id="monitor-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"></div>
            </div>

            <div class="p-10 h-full flex flex-col">
                <div class="mb-8 flex justify-between items-center">
                    <div class="flex items-center gap-6">
                        <span id="q-type-label" class="bg-slate-900 text-white text-xs font-black px-6 py-2 rounded-full uppercase italic shadow-xl tracking-widest">MISSION INTEL</span>
                        <span id="player-identity-tag" class="text-indigo-600 text-3xl font-black italic uppercase">勇者代號：[載入中]</span>
                    </div>
                    <span id="q-index-label" class="text-slate-200 text-8xl font-black italic">#01</span>
                </div>
                
                <div id="q-content-text" class="text-6xl font-black text-slate-900 tracking-tighter leading-tight italic uppercase mb-12 flex items-center justify-center text-center px-10" style="flex: 0 0 160px;">正在讀取戰略資料...</div>
                
                <div class="flex-1 flex items-center justify-center relative">
                    <div id="handwriting-area" class="hidden w-full h-full flex items-center">
                        <div id="handwriting-sub-container" class="w-full h-full flex items-center">
                            <div id="canvas-tools" class="flex flex-col gap-3 w-56 p-4">
                                <button onclick="window.setTool('pen')" id="tool-pen" class="w-full bg-slate-900 text-white py-6 rounded-3xl shadow-xl border-4 border-slate-700 flex flex-col items-center gap-1 transition-all"><i data-lucide="pen-tool"></i>黑筆</button>
                                <button onclick="window.setTool('eraser')" id="tool-eraser" class="w-full bg-white text-slate-400 py-6 rounded-3xl border-2 flex flex-col items-center gap-1"><i data-lucide="eraser"></i>橡皮擦</button>
                                <button onclick="window.undoAction()" class="bg-white text-slate-400 py-4 rounded-2xl border-2">回上一步</button>
                                <button onclick="window.clearCanvas()" class="bg-white text-rose-400 py-4 rounded-2xl border-2 border-rose-50">全部清空</button>
                                <div class="grid grid-cols-2 gap-2 mt-4">
                                    <button onclick="window.zoomCanvas(0.1)" class="bg-slate-800 text-white py-5 rounded-2xl font-black text-2xl shadow-md">+</button>
                                    <button onclick="window.zoomCanvas(-0.1)" class="bg-slate-800 text-white py-5 rounded-2xl font-black text-2xl shadow-md">-</button>
                                </div>
                                <button onclick="window.submitHandwriting()" class="w-full bg-emerald-600 text-white py-10 rounded-[3rem] text-4xl font-black shadow-2xl mt-4">傳 送</button>
                            </div>
                            
                            <div id="canvas-container-outer" class="relative flex items-center justify-center">
                                <div id="canvas-container" class="tian-zi-ge w-[500px] h-[500px] shadow-[0_30px_60px_rgba(0,0,0,0.1)] relative">
                                    <div class="writing-guide-cross"></div>
                                    <div id="writing-guide" class="writing-bg-text absolute inset-0 text-slate-900/10 hidden"></div>
                                    <canvas id="writing-canvas" width="500" height="500" class="absolute top-0 left-0 cursor-crosshair z-10 touch-none"></canvas>
                                    <canvas id="teacher-ink-canvas" width="500" height="500" class="absolute top-0 left-0 pointer-events-none z-20"></canvas>
                                </div>
                                <div id="locked-overlay" class="hidden absolute inset-0 z-40 bg-transparent cursor-not-allowed"></div>
                            </div>
                        </div>
                    </div>

                    <div id="choice-area" class="hidden w-full max-w-4xl flex flex-col gap-8">
                        <div id="options-container" class="grid grid-cols-1 gap-6"></div>
                        <button id="multi-submit-btn" onclick="window.submitMultiAnswer()" class="hidden w-full bg-indigo-600 text-white py-12 rounded-[4rem] text-5xl font-black shadow-2xl">確 認 傳 送</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 奪地 Modal (學生成功) -->
    <div id="attack-modal" class="hidden fixed inset-0 bg-slate-900/95 backdrop-blur-xl z-[150] flex flex-col items-center justify-center p-10 animate-in zoom-in duration-500">
        <h2 class="text-7xl font-black text-white italic uppercase tracking-widest mb-10">挑戰成功！</h2>
        <div class="w-full max-w-[700px] relative">
            <svg id="board-svg-main" viewBox="0 0 550 550" class="w-full h-auto drop-shadow-[0_20px_100px_rgba(255,255,255,0.2)]"></svg>
        </div>
        <p class="text-indigo-400 text-2xl font-black tracking-[0.4em] italic uppercase mt-10">點擊圓圈奪取領地</p>
    </div>

    <!-- 學生名號入口 -->
    <div id="player-select-screen" class="hidden full-screen-panel bg-slate-900 flex flex-col items-center justify-center p-6 z-[65]">
        <div class="max-w-md w-full bg-white p-10 rounded-[3.5rem] shadow-2xl text-center space-y-8 relative border-[10px] border-slate-800">
            <h2 class="text-4xl font-black italic uppercase text-slate-900">您的名號</h2>
            <input type="text" id="user-name-input" maxlength="8" placeholder="請輸入名字..." class="w-full border-b-4 border-slate-100 p-4 text-center text-3xl font-black outline-none focus:border-indigo-600">
            <div class="grid grid-cols-2 gap-4">
                <button onclick="window.chooseHand('left')" id="hand-left-btn" class="p-6 border-4 border-slate-100 rounded-3xl flex flex-col items-center gap-2">左撇子</button>
                <button onclick="window.chooseHand('right')" id="hand-right-btn" class="p-6 border-4 border-indigo-500 rounded-3xl flex flex-col items-center gap-2 bg-indigo-50 text-indigo-600">右撇子</button>
            </div>
            <button id="student-confirm-btn" onclick="window.confirmStudentName()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black text-xl shadow-xl">確認加入</button>
        </div>
    </div>

    <!-- 全屏地圖 -->
    <div id="full-map-modal" class="hidden fixed inset-0 bg-slate-900/98 backdrop-blur-xl z-[400] flex flex-col items-center justify-center p-10">
        <div class="flex justify-between w-full max-w-5xl mb-10">
            <h2 class="text-5xl font-black text-white italic uppercase">戰 略 全 圖</h2>
            <button onclick="document.getElementById('full-map-modal').classList.add('hidden')" class="bg-rose-600 text-white px-10 py-4 rounded-full font-black text-2xl shadow-xl">關閉地圖</button>
        </div>
        <div class="w-full max-w-[850px]">
            <svg id="board-svg-main-zoom" viewBox="0 0 550 550" class="w-full h-auto drop-shadow-[0_40px_100px_rgba(255,255,255,0.15)]"></svg>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, arrayUnion, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBBIi6sw-wUzp-Jxc3dXJhl5DZ3-6LMe-o", 
            authDomain: "my-handwriting-tool.firebaseapp.com", 
            projectId: "my-handwriting-tool", 
            storageBucket: "my-handwriting-tool.firebasestorage.app", 
            messagingSenderId: "649810632937", 
            appId: "1:649810632937:web:085f7e5c8f5290d6da9078" 
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const SYNC_ID = 'territory-war-final-horse-2026';

        let role = null, user = null, gameState = null, currentPlayerId = null, handPref = 'right';
        let currentTool = 'pen', historyStack = [], canAttack = false, currentQIdx = 0, multiSelected = [];
        let lastInkSync = 0, canvasScale = 1.0, teacherPreviewIdx = 0;

        // --- 核心函式 ---
        window.switchRole = async (r) => {
            role = r; document.getElementById('entry-screen').classList.add('hidden');
            if(role === 'teacher') {
                document.getElementById('teacher-setup-screen').classList.remove('hidden');
                document.getElementById('teacher-monitoring-wall').classList.remove('hidden');
                QRCode.toCanvas(document.getElementById('qr-canvas'), window.location.href, { width: 250, margin: 1 });
                
                // 自動注入預設題目 (轉交指令要求)
                const list = document.getElementById('question-list');
                list.innerHTML = '';
                window.addQuestionRow('hand', '戰：請寫出挑戰之戰的戰字');
                window.addQuestionRow('choice', '2026年是哪一個生肖年？', '龍,蛇,馬,羊', '馬');
                window.addQuestionRow('boolean', '這是一個領地爭奪戰工具嗎？', '', '是');
                
                const ref = doc(db, 'artifacts', SYNC_ID, 'public', 'data', 'gameSession', 'main');
                if(!(await getDoc(ref)).exists()) await setDoc(ref, { status: 'lobby', lobbyPlayers: [], lastUpdate: Date.now() });
            } else {
                document.getElementById('player-select-screen').classList.remove('hidden');
            }
            lucide.createIcons();
        };

        window.addQuestionRow = (type, content='', options='', answer='') => {
            const container = document.getElementById('question-list');
            const div = document.createElement('div');
            div.className = "bg-white p-5 rounded-2xl border-2 border-slate-100 shadow-sm space-y-4 group hover:border-indigo-300 transition-all";
            div.innerHTML = `
                <div class="flex gap-4">
                    <div class="bg-slate-900 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase flex items-center justify-center w-20 italic">${type}</div>
                    <input type="text" class="q-content flex-1 bg-slate-50 p-3 rounded-xl font-bold text-sm outline-none" value="${content}">
                    <input type="hidden" class="q-type-val" value="${type}">
                    <button onclick="this.parentElement.parentElement.remove()" class="text-slate-300 hover:text-rose-500"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                </div>
                <div class="q-config-area ${type==='choice'?'':'hidden'} space-y-2">
                    <input type="text" class="q-opts w-full bg-slate-100 p-2 rounded-lg text-xs font-bold" placeholder="選項(逗號隔開)" value="${options}">
                    <input type="text" class="q-ans w-full bg-emerald-50 p-2 rounded-lg text-xs font-black text-emerald-700" placeholder="正確答案" value="${answer}">
                </div>
                <div class="q-ans-bool-area ${type==='boolean'?'':'hidden'}">
                    <input type="text" class="q-ans-bool w-full bg-amber-50 p-2 rounded-lg text-xs font-black text-amber-700" placeholder="對 或 錯" value="${answer}">
                </div>
            `;
            container.appendChild(div);
            lucide.createIcons();
        };

        window.chooseHand = (h) => {
            handPref = h;
            const sub = document.getElementById('handwriting-sub-container');
            const outer = document.getElementById('canvas-container-outer');
            const tools = document.getElementById('canvas-tools');
            const sidebar = document.getElementById('sidebar-info');
            const canvasArea = document.getElementById('main-canvas-area');

            if (h === 'right') {
                sub.style.flexDirection = 'row';
                outer.classList.add('ml-auto');
                outer.classList.remove('mr-auto');
                canvasArea.parentNode.insertBefore(sidebar, canvasArea);
            } else {
                sub.style.flexDirection = 'row-reverse';
                outer.classList.add('mr-auto');
                outer.classList.remove('ml-auto');
                canvasArea.parentNode.insertBefore(sidebar, canvasArea.nextSibling);
            }
        };

        window.handleTeacherInit = async () => {
            if(!gameState?.lobbyPlayers?.length) return;
            const qs = [];
            document.querySelectorAll('#question-list > div').forEach(row => {
                const type = row.querySelector('.q-type-val').value, raw = row.querySelector('.q-content').value;
                let qd = { type };
                if(type === 'hand') { 
                    const parts = raw.split(/[：:]/); 
                    qd.answer = parts[0]; 
                    qd.content = parts.length > 1 ? parts[1].replace(new RegExp(parts[0], 'g'), '□') : parts[0]; 
                } else if(type === 'choice') { 
                    qd.content = raw; qd.options = row.querySelector('.q-opts').value.split(',').map(s=>s.trim()); qd.answer = row.querySelector('.q-ans').value.trim(); qd.isMulti = qd.answer.includes(','); 
                } else { 
                    qd.content = raw; qd.answer = row.querySelector('.q-ans-bool').value.trim(); 
                }
                qs.push(qd);
            });
            const ps = gameState.lobbyPlayers.map((lp, i) => ({ 
                id: lp.id, name: lp.name, colorClass: `p-${(i%8)+1}-color`, bgClass: `p-${(i%8)+1}-bg`, score: 0, ink: '', monitorHidden: false, boardLocked: false, collabInk: '' 
            }));
            await updateDoc(doc(db, 'artifacts', SYNC_ID, 'public', 'data', 'gameSession', 'main'), { 
                questions: qs, players: ps, status: 'playing', forcedQIdx: 0, showGuide: false, lastUpdate: Date.now(), 
                cells: generateCells(ps.length, qs.length, ps), 
                battleMode: document.getElementById('t-battle-mode').value 
            });
        };

        window.confirmStudentName = async () => {
            const name = document.getElementById('user-name-input').value.trim();
            if(!name || !user) return;
            currentPlayerId = user.uid;
            const ref = doc(db, 'artifacts', SYNC_ID, 'public', 'data', 'gameSession', 'main');
            await updateDoc(ref, { lobbyPlayers: arrayUnion({ id: currentPlayerId, name }), lastUpdate: Date.now() });
            document.getElementById('student-confirm-btn').classList.add('hidden');
            document.getElementById('user-name-input').disabled = true;
        };

        function generateCells(pc, qc, ps) {
            const cells = [];
            const radiusScale = 180 / qc;
            for(let p=0; p<pc; p++) {
                const startA = (360/pc)*p, endA = (360/pc)*(p+1);
                for(let q=0; q<qc; q++) {
                    const r = 50 + radiusScale*q, angle = startA + (endA-startA)*(q/qc) + (endA-startA)/(qc*2);
                    const rad = (angle-90)*Math.PI/180;
                    cells.push({ id: `c_${p}_${q}`, owner: ps[p].id, x: 275 + r*Math.cos(rad), y: 275 + r*Math.sin(rad) });
                }
            }
            return cells;
        }

        async function handleCellClick(cid) {
            if(!canAttack) return;
            const cell = gameState.cells.find(c=>c.id === cid);
            const myCells = gameState.cells.filter(c=>c.owner === currentPlayerId);
            // 鄰近判定 150px (轉交指令要求)
            if(myCells.some(m => Math.hypot(m.x - cell.x, m.y - cell.y) < 150)) {
                cell.owner = currentPlayerId;
                await updateDoc(doc(db, 'artifacts', SYNC_ID, 'public', 'data', 'gameSession', 'main'), { cells: gameState.cells });
                canAttack = false; document.getElementById('attack-modal').classList.add('hidden');
                if(gameState.battleMode === 'self') { currentQIdx++; startStudentTurn(); }
            }
        }

        function renderBoardUI(data) {
            const mini = document.getElementById('board-svg-mini'), main = document.getElementById('board-svg-main'), zoom = document.getElementById('board-svg-main-zoom');
            [mini, main, zoom].forEach(svg => {
                if(!svg) return; svg.innerHTML = '';
                const pc = data.players.length;
                for(let i=0; i<pc; i++) {
                    const sa = (360/pc)*i - 90, ea = (360/pc)*(i+1) - 90;
                    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    path.setAttribute("d", describeArc(275, 275, 240, sa, ea));
                    path.setAttribute("fill", getRgba(data.players[i].colorClass, 0.08)); svg.appendChild(path);
                }
                data.cells.forEach(c => {
                    const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                    circle.setAttribute("cx", c.x); circle.setAttribute("cy", c.y); circle.setAttribute("r", "14");
                    const owner = data.players.find(p=>p.id === c.owner);
                    circle.setAttribute("fill", owner ? getHex(owner.colorClass) : "#e2e8f0");
                    circle.setAttribute("class", "territory-cell");
                    circle.onclick = () => handleCellClick(c.id);
                    svg.appendChild(circle);
                });
            });
        }

        // --- 畫布邏輯 ---
        function initCanvas() {
            const c = document.getElementById('writing-canvas');
            const ctx = c.getContext('2d');
            ctx.lineWidth = 12 * canvasScale; ctx.lineCap = 'round'; ctx.strokeStyle = '#1e293b';
            let dr = false;
            const getXY = (e) => {
                const r = c.getBoundingClientRect();
                const x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
                const y = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
                return [x, y];
            };
            c.onmousedown = (e) => { dr = true; const [x,y] = getXY(e); ctx.beginPath(); ctx.moveTo(x,y); };
            c.ontouchstart = (e) => { e.preventDefault(); dr = true; const [x,y] = getXY(e); ctx.beginPath(); ctx.moveTo(x,y); };
            window.onmousemove = window.ontouchmove = (e) => { 
                if(!dr) return; const [x,y] = getXY(e); 
                ctx.globalCompositeOperation = currentTool === 'eraser' ? 'destination-out' : 'source-over';
                ctx.lineTo(x,y); ctx.stroke(); 
                syncMonitor(); // 即時同步
            };
            window.onmouseup = window.ontouchend = () => { if(dr) { dr = false; syncMonitor(true); } };
        }

        async function syncMonitor(force = false) {
            if(!force && Date.now() - lastInkSync < 1000) return;
            lastInkSync = Date.now();
            const canvas = document.getElementById('writing-canvas');
            if(!canvas) return;
            const dataURL = canvas.toDataURL('image/webp', 0.2);
            const ups = gameState.players.map(p => { if(p.id === currentPlayerId) p.ink = dataURL; return p; });
            await updateDoc(doc(db, 'artifacts', SYNC_ID, 'public', 'data', 'gameSession', 'main'), { players: ups });
        }

        function startStudentTurn() {
            const q = gameState.questions[currentQIdx % gameState.questions.length];
            document.getElementById('q-index-label').innerText = `#${(currentQIdx+1).toString().padStart(2,'0')}`;
            document.getElementById('q-content-text').innerText = q.content;
            document.getElementById('handwriting-area').classList.add('hidden');
            document.getElementById('choice-area').classList.add('hidden');
            if(q.type === 'hand') {
                document.getElementById('handwriting-area').classList.remove('hidden');
                document.getElementById('writing-guide').innerText = q.answer;
                initCanvas();
            } else {
                document.getElementById('choice-area').classList.remove('hidden');
                renderOptions();
            }
        }

        function renderOptions() {
            const q = gameState.questions[currentQIdx % gameState.questions.length];
            const opts = q.type === 'boolean' ? ['是', '否'] : q.options;
            document.getElementById('options-container').innerHTML = opts.map(o => `
                <button onclick="window.submitStudentAnswer('${o}')" class="bg-white p-8 rounded-3xl border-4 border-slate-100 text-3xl font-black text-left hover:border-indigo-500 transition-all">${o}</button>
            `).join('');
        }

        window.submitStudentAnswer = (ans) => {
            const q = gameState.questions[currentQIdx % gameState.questions.length];
            const isCorrect = ans.trim() === q.answer.trim();
            if(isCorrect) {
                canAttack = true; document.getElementById('attack-modal').classList.remove('hidden'); renderBoardUI(gameState);
            } else {
                if(gameState.battleMode === 'self') { currentQIdx++; startStudentTurn(); }
            }
        };

        // --- 輔助函式 ---
        function describeArc(x,y,r,sa,ea) { const s = polarToCartesian(x,y,r,ea), e = polarToCartesian(x,y,r,sa); return ["M",x,y,"L",s.x,s.y,"A",r,r,0,(ea-sa<=180?"0":"1"),0,e.x,e.y,"L",x,y].join(" "); }
        function polarToCartesian(cx,cy,r,a) { const rad = (a-90)*Math.PI/180.0; return {x:cx+r*Math.cos(rad),y:cy+r*Math.sin(rad)}; }
        function getHex(cls) { const m = { 'p-1-color': '#f43f5e', 'p-2-color': '#3b82f6', 'p-3-color': '#10b981', 'p-4-color': '#f59e0b', 'p-5-color': '#8b5cf6', 'p-6-color': '#ec4899', 'p-7-color': '#06b6d4', 'p-8-color': '#64748b' }; return m[cls] || '#e2e8f0'; }
        function getRgba(cls, a) { const h = getHex(cls), r = parseInt(h.slice(1,3), 16), g = parseInt(h.slice(3,5), 16), b = parseInt(h.slice(5,7), 16); return `rgba(${r},${g},${b},${a})`; }

        // --- 初始化 ---
        (async () => {
            const userSnap = await signInAnonymously(auth);
            user = userSnap.user;
            onSnapshot(doc(db, 'artifacts', SYNC_ID, 'public', 'data', 'gameSession', 'main'), (ds) => {
                if(ds.exists()) {
                    gameState = ds.data();
                    if(role === 'teacher') {
                        document.getElementById('join-stats-header').innerText = `報到人數：${gameState.lobbyPlayers.length}`;
                        document.getElementById('ready-count').innerText = gameState.lobbyPlayers.length;
                        document.getElementById('start-battle-btn').disabled = gameState.lobbyPlayers.length === 0;
                        document.getElementById('teacher-lobby-list').innerHTML = gameState.lobbyPlayers.map(p => `<div class='p-3 bg-white border rounded-xl font-bold'>${p.name}</div>`).join('');
                        if(gameState.status === 'playing') {
                            document.getElementById('monitor-grid').innerHTML = gameState.players.map(p => `
                                <div class='bg-white p-4 rounded-3xl border-2'>
                                    <div class='flex items-center gap-2 mb-2'><div class='w-3 h-3 rounded-full ${p.bgClass}'></div>${p.name}</div>
                                    <div class='aspect-square border bg-slate-50 flex items-center justify-center overflow-hidden'><img src="${p.ink}"></div>
                                </div>
                            `).join('');
                        }
                    }
                    if(gameState.status === 'playing') {
                        document.getElementById('teacher-setup-screen').classList.add('hidden');
                        document.getElementById('player-select-screen').classList.add('hidden');
                        document.getElementById('game-screen').classList.remove('hidden');
                        if(role === 'student') {
                            const me = gameState.players.find(p => p.id === currentPlayerId);
                            document.getElementById('player-identity-tag').innerText = `勇者代號：${me?.name}`;
                            document.getElementById('my-name-display').innerText = me?.name;
                            if(gameState.forcedQIdx !== currentQIdx) { currentQIdx = gameState.forcedQIdx; startStudentTurn(); }
                        }
                    }
                }
            });
        })();
        
        window.mountGlobals = () => {
            window.setTool = (t) => { currentTool = t; };
            window.clearCanvas = () => { const c = document.getElementById('writing-canvas'); c.getContext('2d').clearRect(0,0,500,500); syncMonitor(true); };
            window.zoomCanvas = (v) => { canvasScale += v; /* 簡化處理 */ };
            window.submitHandwriting = () => { window.submitStudentAnswer(gameState.questions[currentQIdx].answer); };
            window.openFullMap = () => { document.getElementById('full-map-modal').classList.remove('hidden'); renderBoardUI(gameState); };
            window.copyJoinLink = () => { navigator.clipboard.writeText(window.location.href); alert("已複製！"); };
        };
        window.mountGlobals();
    </script>
</body>
