<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>領地爭奪戰 PRO - 2026 指揮官最終校正版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; color: #1e293b; margin: 0; padding: 0; overflow: hidden; }
        
        /* 田字格基礎樣式 */
        .tian-zi-ge { background-color: #fff; box-shadow: inset 0 0 0 6px #1e293b; border-radius: 4px; position: relative; flex-shrink: 0; transition: width 0.1s, height 0.1s; }
        .writing-guide-cross { position: absolute; inset: 0; pointer-events: none; background-image: linear-gradient(to right, transparent 49.5%, #cbd5e1 50%, transparent 50.5%), linear-gradient(to bottom, transparent 49.5%, #cbd5e1 50%, transparent 50.5%); opacity: 0.8; }
        
        /* 鎖定與狀態樣式 */
        .active-tool { border: 6px solid #4f46e5 !important; box-shadow: 0 0 25px rgba(79, 70, 229, 0.5); transform: scale(1.05); }
        .locked-tools { opacity: 0.4; pointer-events: none !important; filter: grayscale(1); }
        .monitor-card-locked { border: 6px solid #f59e0b !important; box-shadow: 0 0 30px rgba(245, 158, 11, 0.4); }
        
        .full-screen-panel { width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; z-index: 50; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* 地圖圓圈樣式 */
        .territory-cell { transition: all 0.3s ease; cursor: pointer; stroke: #fff; stroke-width: 2px; }
        .territory-cell:hover { transform: scale(1.2); filter: brightness(1.1); }
    </style>
</head>
<body class="min-h-screen overflow-hidden bg-slate-50 font-black">

    <div id="entry-screen" class="full-screen-panel bg-slate-900 flex flex-col items-center justify-center p-6 z-[200]">
        <div class="text-center space-y-12 w-full max-w-4xl">
            <h1 class="text-7xl font-black text-white italic tracking-tighter">領地爭奪 <span class="text-indigo-500 uppercase">PRO</span></h1>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 px-4">
                <button onclick="window.switchRole('teacher')" class="bg-white/5 border-2 border-white/10 p-12 rounded-[3rem] hover:bg-white hover:text-slate-900 transition-all flex flex-col items-center gap-6 group">
                    <i data-lucide="graduation-cap" class="w-20 h-20 text-indigo-500 group-hover:rotate-12 transition-transform"></i>
                    <div class="text-4xl uppercase italic text-white group-hover:text-slate-900 font-black">教師指揮官</div>
                </button>
                <button onclick="window.switchRole('student')" class="bg-white/5 border-2 border-white/10 p-12 rounded-[3rem] hover:bg-white hover:text-slate-900 transition-all flex flex-col items-center gap-6 group">
                    <i data-lucide="sword" class="w-20 h-20 text-emerald-500 group-hover:-rotate-12 transition-transform"></i>
                    <div class="text-4xl uppercase italic text-white group-hover:text-slate-900 font-black">參戰勇者</div>
                </button>
            </div>
        </div>
    </div>

    <div id="teacher-setup-screen" class="hidden full-screen-panel bg-white text-slate-900 flex flex-col">
        <header class="p-4 border-b-2 border-slate-200 flex justify-between items-center bg-white z-10">
            <h2 class="text-2xl font-black italic text-indigo-600 uppercase">司令部 Lobby</h2>
            <div id="join-stats-header" class="bg-indigo-600 text-white px-5 py-1.5 rounded-full text-sm font-black uppercase italic">已報到: 0 人</div>
            <button onclick="location.reload()" class="text-slate-400 hover:text-rose-500"><i data-lucide="x-circle" class="w-8 h-8"></i></button>
        </header>
        <div class="flex-1 flex overflow-hidden">
            <div class="w-[320px] bg-slate-50 border-r p-6 space-y-6 overflow-y-auto custom-scrollbar">
                <div class="bg-white p-4 rounded-3xl shadow-lg text-center border">
                    <div class="bg-white aspect-square rounded-xl flex items-center justify-center mb-4 border-2 border-dashed">
                        <canvas id="qr-canvas" class="w-full h-full"></canvas>
                    </div>
                    <button onclick="window.copyJoinLink()" class="w-full py-2.5 bg-slate-900 text-white rounded-lg font-black text-sm italic">複製邀請連結</button>
                </div>
            </div>
            <div class="flex-1 p-8 flex flex-col overflow-hidden">
                <h3 class="text-xl font-black italic mb-6 flex items-center gap-2"><i data-lucide="scroll-text" class="text-indigo-600"></i>任務配置清單</h3>
                <div id="question-list" class="flex-1 space-y-3 overflow-y-auto pr-4 custom-scrollbar"></div>
            </div>
            <div class="w-[280px] bg-slate-100 border-l p-6 overflow-y-auto custom-scrollbar">
                <h3 class="font-black text-xs uppercase text-slate-400 mb-4 flex justify-between italic">勇者候命區 <span id="ready-count" class="text-indigo-600">0</span></h3>
                <div id="teacher-lobby-list" class="space-y-3"></div>
            </div>
        </div>
        <div class="p-6 border-t-2 bg-white">
            <button onclick="window.handleTeacherInit()" id="start-battle-btn" class="w-full bg-slate-900 text-white font-black py-5 rounded-2xl text-2xl uppercase italic shadow-xl">啟動戰鬥</button>
        </div>
    </div>

    <div id="player-select-screen" class="hidden full-screen-panel bg-slate-900 flex flex-col items-center justify-center p-6 z-[65]">
        <div class="max-w-md w-full bg-white p-10 rounded-[4rem] shadow-2xl text-center space-y-8 relative border-[12px] border-slate-800">
            <div id="student-entry-form" class="space-y-8">
                <h2 class="text-4xl font-black italic uppercase text-slate-900">勇者登錄</h2>
                <input type="text" id="user-name-input" maxlength="10" placeholder="您的戰鬥代號..." class="w-full border-b-4 border-slate-100 p-4 text-center text-3xl font-black outline-none focus:border-indigo-600">
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="window.chooseHand('left')" id="hand-left-btn" class="p-6 border-4 border-slate-100 rounded-3xl flex flex-col items-center gap-2 transition-all">
                        <i data-lucide="hand" class="w-12 h-12 -scale-x-100"></i>
                        <span class="font-black">左撇子</span>
                    </button>
                    <button onclick="window.chooseHand('right')" id="hand-right-btn" class="p-6 border-4 border-indigo-500 bg-indigo-50 rounded-3xl flex flex-col items-center gap-2 transition-all">
                        <i data-lucide="hand" class="w-12 h-12 text-indigo-500"></i>
                        <span class="font-black">右撇子</span>
                    </button>
                </div>
                <button onclick="window.confirmStudentName()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black text-xl shadow-xl italic uppercase">確認部署</button>
            </div>
            <div id="student-wait-hint" class="hidden py-12 space-y-6">
                <div class="w-20 h-20 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto animate-bounce"><i data-lucide="clock" class="w-10 h-10"></i></div>
                <h2 class="text-3xl font-black italic">已成功就位</h2>
                <p class="text-slate-400 animate-pulse italic uppercase">等待指揮官下達作戰指令...</p>
            </div>
        </div>
    </div>

    <div id="game-screen" class="hidden full-screen-panel bg-slate-100 flex overflow-hidden">
        
        <div id="pause-overlay" class="hidden absolute inset-0 bg-slate-900/80 z-[100] flex flex-col items-center justify-center text-white text-center p-6">
            <i data-lucide="pause-circle" class="w-32 h-32 mb-8 text-indigo-400 animate-pulse"></i>
            <h2 class="text-6xl font-black italic uppercase">作戰暫停</h2>
        </div>

        <div id="sidebar-info" class="w-[320px] bg-white border-r-2 border-slate-200 p-6 flex flex-col gap-6 shadow-xl z-20 overflow-y-auto custom-scrollbar transition-all">
            <div id="student-info-panel" class="bg-slate-900 p-5 rounded-[2rem] text-white shadow-md">
                <div class="flex items-center gap-4">
                    <div id="my-color-preview" class="w-14 h-14 rounded-full border-4 border-white/10 shadow-inner"></div>
                    <div class="flex-1">
                        <div id="my-name-display" class="text-xl font-black uppercase truncate italic">勇者</div>
                        <div id="game-progress" class="text-xs text-indigo-400 mt-1 uppercase italic">分數: 0</div>
                    </div>
                </div>
            </div>

            <!-- 教師控制台 -->
            <div id="teacher-sidebar-tools" class="hidden space-y-4">
                <div class="bg-indigo-900 p-4 rounded-3xl border-2 border-indigo-100 text-white">
                    <h4 class="text-[10px] text-indigo-300 uppercase italic mb-2">任務導航</h4>
                    <div id="teacher-hud-q" class="text-sm font-black mb-4 bg-indigo-800 p-3 rounded-xl border border-indigo-700 italic min-h-[50px] leading-tight">載入中...</div>
                    <div class="grid grid-cols-2 gap-2 mb-2">
                        <button onclick="window.navigateQuestion(-1)" class="bg-white/10 hover:bg-white/20 py-2 rounded-lg text-xs italic">上一題</button>
                        <button onclick="window.navigateQuestion(1)" class="bg-white/10 hover:bg-white/20 py-2 rounded-lg text-xs italic">下一題</button>
                    </div>
                    <button onclick="window.syncQuestionToAll()" class="w-full bg-indigo-500 hover:bg-indigo-400 text-white py-3 rounded-xl font-black text-xs italic uppercase">同步全體勇者</button>
                </div>
                <button id="pause-btn" onclick="window.togglePause()" class="w-full bg-rose-600 text-white py-4 rounded-2xl font-black text-sm italic">暫停全班作答</button>
            </div>

            <div class="flex-1 bg-white/50 rounded-[2.5rem] p-4 flex flex-col items-center justify-center border-2 border-white shadow-inner relative overflow-hidden">
                <h4 class="absolute top-4 w-full text-center text-[10px] text-slate-400 uppercase italic">戰略圖預覽</h4>
                <div class="w-full max-w-[200px]">
                    <svg id="board-svg-mini" viewBox="0 0 550 550" class="w-full h-auto drop-shadow-lg"></svg>
                </div>
                <button onclick="window.openFullMap()" class="absolute bottom-4 text-[10px] text-indigo-600 font-black flex items-center gap-1 italic"><i data-lucide="maximize" class="w-3 h-3"></i> 放大戰略圖</button>
            </div>
        </div>

        <div id="main-canvas-area" class="flex-1 flex flex-col bg-slate-100 relative p-0 m-0 overflow-hidden">
            
            <!-- 教師監控牆 -->
            <div id="teacher-monitoring-wall" class="hidden absolute inset-0 z-40 p-8 overflow-y-auto custom-scrollbar flex flex-col bg-slate-100">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-4xl font-black italic uppercase">即時監控牆</h3>
                    <div class="flex gap-2">
                        <button onclick="window.toggleAllMonitors(false)" class="bg-indigo-600 text-white px-6 py-2 rounded-full text-xs font-black italic">顯示全體</button>
                        <button onclick="window.toggleAllMonitors(true)" class="bg-slate-800 text-white px-6 py-2 rounded-full text-xs font-black italic">遮蔽全體</button>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="monitor-grid"></div>
            </div>

            <!-- 學生答題區 -->
            <!-- CRITICAL: p-0 m-0 ensuring edge alignment -->
            <div id="student-answer-area" class="h-full flex flex-col transition-all overflow-hidden p-0 m-0 relative">
                <div class="px-10 pt-6 flex justify-between items-start">
                    <div class="flex flex-col gap-2">
                        <span id="q-type-label" class="bg-slate-900 text-white text-[10px] font-black px-6 py-1.5 rounded-full uppercase italic shadow-lg w-max">MISSION INTEL</span>
                        <div id="player-identity-tag" class="text-3xl font-black italic text-indigo-600 uppercase">勇者代號：[載入中]</div>
                    </div>
                    <span id="q-index-label" class="text-slate-200 text-7xl font-black italic tracking-tighter">#01</span>
                </div>
                
                <div id="q-content-text" class="font-black text-slate-900 italic uppercase mb-4 flex items-center justify-center text-center text-5xl px-10 min-h-[100px]">正在通訊同步...</div>
                
                <!-- 手寫區域 -->
                <div id="handwriting-area" class="hidden flex-1 flex items-center p-0 m-0 relative">
                    <!-- 工具欄：固定寬度 -->
                    <div id="canvas-tools" class="flex flex-col gap-2 w-44 px-4 z-30 flex-shrink-0">
                        <button onclick="window.setTool('pen')" id="tool-pen" class="w-full bg-indigo-600 text-white py-5 rounded-3xl border-4 border-indigo-300 font-black shadow-lg flex flex-col items-center active-tool"><i data-lucide="pen-tool" class="mb-1"></i>黑筆</button>
                        <button onclick="window.setTool('eraser')" id="tool-eraser" class="w-full bg-slate-200 text-slate-500 py-5 rounded-3xl font-black flex flex-col items-center"><i data-lucide="eraser" class="mb-1"></i>橡皮擦</button>
                        <button onclick="window.undoAction()" id="tool-undo" class="w-full bg-slate-200 text-slate-500 py-5 rounded-3xl font-black italic">返回上步</button>
                        <button onclick="window.clearCanvas()" id="tool-clear" class="w-full bg-slate-200 text-slate-500 py-5 rounded-3xl font-black italic">清空</button>
                        <div class="grid grid-cols-2 gap-2 mt-2">
                            <button onclick="window.zoomCanvas(0.1)" id="zoom-plus" class="bg-slate-800 text-white py-4 rounded-2xl font-black text-2xl shadow-md">+</button>
                            <button onclick="window.zoomCanvas(-0.1)" id="zoom-minus" class="bg-slate-800 text-white py-4 rounded-2xl font-black text-2xl shadow-md">-</button>
                        </div>
                        <button onclick="window.submitHandwriting()" class="w-full bg-emerald-600 text-white py-8 rounded-[2.5rem] text-4xl font-black shadow-2xl mt-4 italic uppercase">傳送</button>
                    </div>

                    <!-- 田字格容器：使用 ml-auto 確保右撇子時絕對貼齊右邊邊緣 -->
                    <div id="canvas-container" class="tian-zi-ge w-[500px] h-[500px] shadow-2xl relative overflow-hidden bg-white ml-auto">
                        <div class="writing-guide-cross"></div>
                        <canvas id="writing-canvas" width="500" height="500" class="absolute top-0 left-0 cursor-crosshair z-10 touch-none"></canvas>
                        <canvas id="remote-ink-canvas" width="500" height="500" class="absolute top-0 left-0 pointer-events-none z-20"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="collab-modal" class="hidden full-screen-panel bg-slate-900/95 backdrop-blur-md z-[300] flex items-center justify-center p-8">
        <div class="w-full max-w-6xl flex gap-12 items-center">
            <div class="flex-1 relative">
                <div id="collab-status-tag" class="absolute -top-12 left-0 bg-amber-500 text-white px-6 py-2 rounded-full text-xs font-black italic shadow-lg z-20 uppercase">指導中</div>
                <div class="bg-white rounded-3xl overflow-hidden shadow-2xl relative border-8 border-slate-700" style="width: 700px; height: 700px;">
                    <canvas id="collab-student-view" width="700" height="700" class="absolute inset-0 opacity-40 pointer-events-none"></canvas>
                    <canvas id="collab-canvas" width="700" height="700" class="relative z-10 cursor-crosshair"></canvas>
                </div>
            </div>
            <div class="w-80 space-y-4 text-white">
                <div class="mb-6">
                    <h3 class="text-4xl font-black italic truncate uppercase" id="collab-name">勇者名稱</h3>
                    <p id="collab-lock-info" class="text-amber-400 font-bold uppercase mt-1 text-xs">狀態：畫筆開放中</p>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="window.setCollabPen('#ef4444')" id="c-pen-red" class="bg-rose-600 text-white p-6 rounded-2xl font-black text-2xl shadow-lg border-4 border-transparent active-tool italic">紅筆</button>
                    <button onclick="window.setCollabPen('#3b82f6')" id="c-pen-blue" class="bg-blue-600 text-white p-6 rounded-2xl font-black text-2xl shadow-lg border-4 border-transparent italic">藍筆</button>
                </div>
                <button onclick="window.setCollabPen('eraser')" id="c-tool-eraser" class="w-full bg-slate-200 text-slate-800 py-4 rounded-2xl font-black text-xl italic">橡皮擦</button>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="window.undoCollab()" class="bg-slate-700 text-white py-3 rounded-xl text-xs font-black italic uppercase">返回上步</button>
                    <button onclick="window.clearCollabTeacherOnly()" class="bg-slate-700 text-white py-3 rounded-xl text-xs font-black italic uppercase">清除指導線</button>
                </div>
                <!-- REMOTE CLEAR BUTTON -->
                <button onclick="window.clearStudentInkRemote()" class="w-full bg-slate-900 border-2 border-rose-500 text-rose-500 py-4 rounded-2xl font-black text-xs italic mt-4 uppercase">一鍵清除學員筆跡</button>
                
                <button id="lock-student-btn" onclick="window.toggleStudentLock()" class="w-full bg-amber-600 text-white py-6 rounded-3xl font-black text-xl shadow-xl mt-4 italic uppercase">鎖定學員畫筆</button>
                <button onclick="window.closeCollab()" class="w-full bg-rose-600 text-white py-6 rounded-3xl font-black text-xl shadow-xl italic uppercase">結束指導並解鎖</button>
            </div>
        </div>
    </div>

    <div id="attack-modal" class="hidden full-screen-panel bg-slate-900/95 backdrop-blur-xl z-[150] flex flex-col items-center justify-center p-10">
        <h2 class="text-6xl text-white italic uppercase mb-12 text-center font-black">任務達成！奪取領地！</h2>
        <div class="w-full max-w-[750px] relative">
            <svg id="board-svg-main" viewBox="0 0 550 550" class="w-full h-auto drop-shadow-2xl"></svg>
        </div>
        <button onclick="document.getElementById('attack-modal').classList.add('hidden')" class="mt-12 bg-white px-12 py-4 rounded-full font-black text-2xl italic uppercase">關閉視窗</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, arrayUnion, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBBIi6sw-wUzp-Jxc3dXJhl5DZ3-6LMe-o", authDomain: "my-handwriting-tool.firebaseapp.com", projectId: "my-handwriting-tool", storageBucket: "my-handwriting-tool.firebasestorage.app", messagingSenderId: "649810632937", appId: "1:649810632937:web:085f7e5c8f5290d6da9078" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const SYNC_ID = 'TW-2026-FINAL-PHYSICAL-EDGE-FIX-V5';

        let role = null, user = null, gameState = null, currentPlayerId = null, handPref = 'right';
        let currentTool = 'pen', collabPenColor = '#ef4444', collabTargetId = null;
        let lastSyncTime = 0, canAttack = false, canvasScale = 1.0;
        let undoStack = [], collabUndoStack = [], teacherPreviewIdx = 0;

        window.mountGlobals = function() {
            Object.assign(window, {
                switchRole: async (r) => {
                    role = r;
                    document.getElementById('entry-screen').classList.add('hidden');
                    const ref = doc(db, 'artifacts', SYNC_ID);
                    
                    if(role === 'teacher') {
                        document.getElementById('teacher-setup-screen').classList.remove('hidden');
                        QRCode.toCanvas(document.getElementById('qr-canvas'), window.location.href, { width: 250, margin: 1 });
                        
                        await setDoc(ref, { 
                            status: 'lobby', 
                            lobbyPlayers: [], 
                            players: [], 
                            paused: false, 
                            lastUpdate: Date.now(), 
                            curQ: 0, 
                            questions: [
                                { type: 'hand', content: '戰：請寫出挑戰之戰的戰字', answer: '戰' },
                                { type: 'choice', content: '2026年是哪一個生肖年？', options: ['龍','蛇','馬','羊'], answer: '馬' },
                                { type: 'boolean', content: '我們正在進行領地爭奪戰嗎？', answer: '是' }
                            ] 
                        }, { merge: true });
                    } else {
                        document.getElementById('player-select-screen').classList.remove('hidden');
                    }

                    onSnapshot(ref, (ds) => {
                        if(ds.exists()) {
                            gameState = ds.data();
                            window.syncUI();
                            if(gameState.status === 'playing' && document.getElementById('game-screen').classList.contains('hidden')) {
                                document.getElementById('teacher-setup-screen').classList.add('hidden');
                                document.getElementById('player-select-screen').classList.add('hidden');
                                document.getElementById('game-screen').classList.remove('hidden');
                                window.startTurn();
                            }
                            if(collabTargetId) window.updateCollabStudentView();
                        }
                    });
                },

                syncUI: () => {
                    if(!gameState) return;
                    const lobby = gameState.lobbyPlayers || [];
                    document.getElementById('join-stats-header').innerText = `已報到: ${lobby.length} 人`;
                    document.getElementById('ready-count').innerText = lobby.length;

                    if(role === 'teacher') {
                        window.renderQuestionList();
                        document.getElementById('teacher-lobby-list').innerHTML = lobby.map(p => `<div class="bg-white p-3 rounded-xl border flex items-center gap-3 shadow-sm font-black text-slate-800"><div class="w-3 h-3 rounded-full bg-indigo-500"></div><span>${p.name}</span></div>`).join('');
                        if(gameState.status === 'playing') {
                            document.getElementById('teacher-monitoring-wall').classList.remove('hidden');
                            document.getElementById('teacher-sidebar-tools').classList.remove('hidden');
                            window.renderMonitorWall();
                            const q = gameState.questions[gameState.curQ || 0];
                            document.getElementById('teacher-hud-q').innerText = q?.content || '戰鬥開始...';
                        }
                    }

                    if(role === 'student' && currentPlayerId) {
                        const me = (gameState.players || []).find(p => p.id === currentPlayerId);
                        if(me) {
                            const isLocked = me.locked || gameState.paused;
                            ['tool-pen', 'tool-eraser', 'tool-undo', 'tool-clear', 'zoom-plus', 'zoom-minus'].forEach(id => {
                                const btn = document.getElementById(id); 
                                if(btn) btn.classList.toggle('locked-tools', isLocked);
                            });
                            document.getElementById('writing-canvas').classList.toggle('pointer-events-none', isLocked);
                            document.getElementById('player-identity-tag').innerText = `勇者代號：${me.name}`;
                            document.getElementById('my-name-display').innerText = me.name;
                            document.getElementById('game-progress').innerText = `分數: ${me.score || 0}`;
                            
                            if(me.collabInk) window.drawRemoteInk(me.collabInk);
                            else { const rcc = document.getElementById('remote-ink-canvas'); if(rcc) rcc.getContext('2d').clearRect(0,0,2000,2000); }
                            
                            if(gameState.curQ !== window.currentLocalQ) { window.startTurn(); }
                        }
                    }
                    
                    const pb = document.getElementById('pause-btn');
                    if(pb) { 
                        pb.innerText = gameState.paused ? "恢復全班作答" : "暫停全班作答"; 
                        pb.className = gameState.paused ? "w-full bg-emerald-600 text-white py-4 rounded-2xl font-black shadow-lg italic" : "w-full bg-rose-600 text-white py-4 rounded-2xl font-black shadow-lg italic"; 
                    }
                    document.getElementById('pause-overlay').classList.toggle('hidden', !gameState.paused);
                    window.renderMapUI();
                },

                chooseHand: (h) => {
                    handPref = h;
                    const gameScreen = document.getElementById('game-screen');
                    const canvasBox = document.getElementById('canvas-container');
                    const toolBox = document.getElementById('canvas-tools');
                    
                    // PHYSICALLY HITTING THE EDGE
                    if(h === 'left') {
                        gameScreen.style.flexDirection = 'row-reverse'; // Sidebar to right
                        canvasBox.classList.remove('ml-auto');
                        canvasBox.classList.add('mr-auto'); // Push grid to left edge
                        toolBox.style.order = "2"; // Move tools to the right of the grid
                    } else {
                        gameScreen.style.flexDirection = 'row'; // Sidebar to left
                        canvasBox.classList.remove('mr-auto');
                        canvasBox.classList.add('ml-auto'); // Push grid to right edge
                        toolBox.style.order = "1"; // Move tools to the left of the grid
                    }
                },

                zoomCanvas: (delta) => {
                    const c = document.getElementById('writing-canvas');
                    const tc = document.getElementById('remote-ink-canvas');
                    const oldSize = c.width;
                    
                    // 1. Capture current state as images
                    const inkImg = new Image(); inkImg.src = c.toDataURL();
                    const remoteImg = new Image(); remoteImg.src = tc.toDataURL();

                    inkImg.onload = () => {
                        canvasScale = Math.max(0.6, Math.min(1.6, canvasScale + delta));
                        const newSize = 500 * canvasScale;
                        
                        document.getElementById('canvas-container').style.width = `${newSize}px`;
                        document.getElementById('canvas-container').style.height = `${newSize}px`;
                        
                        c.width = newSize; c.height = newSize; 
                        tc.width = newSize; tc.height = newSize;
                        
                        // 2. Redraw ink scaled to new size
                        const ctx = c.getContext('2d');
                        ctx.drawImage(inkImg, 0, 0, oldSize, oldSize, 0, 0, newSize, newSize);
                        
                        const tctx = tc.getContext('2d');
                        tctx.drawImage(remoteImg, 0, 0, oldSize, oldSize, 0, 0, newSize, newSize);
                        
                        window.initCanvas(true); // Re-initialize listeners but keep drawing
                    };
                },

                initCanvas: (isZoom = false) => {
                    const c = document.getElementById('writing-canvas');
                    const ctx = c.getContext('2d');
                    ctx.lineWidth = 14 * canvasScale; ctx.lineCap = 'round'; ctx.strokeStyle = '#1e293b';
                    if(!isZoom) { ctx.clearRect(0,0,c.width,c.height); undoStack = [c.toDataURL()]; }
                    let dr = false;
                    const gxy = (e) => {
                        const r = c.getBoundingClientRect();
                        const x = (e.touches ? e.touches[0].clientX : e.clientX);
                        const y = (e.touches ? e.touches[0].clientY : e.clientY);
                        return [(x - r.left) * (c.width / r.width), (y - r.top) * (c.height / r.height)];
                    };
                    c.onmousedown = (e) => { if(window.isLocked()) return; dr = true; ctx.beginPath(); const [x,y] = gxy(e); ctx.moveTo(x,y); };
                    c.ontouchstart = (e) => { if(window.isLocked()) return; dr = true; const [x,y] = gxy(e); ctx.beginPath(); ctx.moveTo(x,y); e.preventDefault(); };
                    window.onmousemove = (e) => { if(!dr) return; const [x,y] = gxy(e); ctx.globalCompositeOperation = currentTool === 'eraser' ? 'destination-out' : 'source-over'; ctx.lineTo(x,y); ctx.stroke(); };
                    window.ontouchmove = (e) => { if(!dr) return; const [x,y] = gxy(e); ctx.globalCompositeOperation = currentTool === 'eraser' ? 'destination-out' : 'source-over'; ctx.lineTo(x,y); ctx.stroke(); e.preventDefault(); };
                    const handleEnd = () => { if(dr) { dr = false; undoStack.push(c.toDataURL()); window.syncInk(true); } };
                    window.onmouseup = handleEnd; window.ontouchend = handleEnd;
                },

                renderMonitorWall: () => {
                    const grid = document.getElementById('monitor-grid');
                    grid.innerHTML = (gameState.players || []).map(p => `
                        <div class="bg-white p-4 rounded-[2rem] shadow-md border-4 ${p.locked ? 'monitor-card-locked' : 'border-transparent'} relative transition-all">
                            <div class="flex justify-between items-center mb-3">
                                <div class="flex items-center gap-2 font-black">
                                    <div class="w-4 h-4 rounded-full ${p.bgClass || 'bg-indigo-500'}"></div>
                                    <span class="text-sm font-black">${p.name} ${p.locked ? '🔒' : ''}</span>
                                </div>
                                <div class="flex gap-1">
                                    <button onclick="window.toggleIndividualMonitor('${p.id}')" class="p-2 bg-slate-200 rounded-lg text-slate-500 hover:text-indigo-600"><i data-lucide="${p.monitorHidden ? 'eye-off' : 'eye'}" class="w-3 h-3"></i></button>
                                    <button onclick="window.openCollab('${p.id}', '${p.name}')" class="p-2 bg-indigo-600 text-white rounded-lg text-[10px] font-black italic">進入指導</button>
                                </div>
                            </div>
                            <div class="aspect-square bg-white rounded-2xl overflow-hidden border border-slate-100 flex items-center justify-center relative">
                                ${p.monitorHidden ? '<div class="absolute inset-0 bg-slate-100 flex items-center justify-center text-slate-400 text-xs font-black italic uppercase">已遮蔽</div>' : (p.ink ? `<img src="${p.ink}" class="max-w-full max-h-full">` : '<div class="text-[10px] text-slate-200 font-black italic">無筆跡</div>')}
                            </div>
                        </div>
                    `).join('');
                    lucide.createIcons();
                },

                toggleIndividualMonitor: async (sid) => {
                    const ups = gameState.players.map(p => { if(p.id === sid) p.monitorHidden = !p.monitorHidden; return p; });
                    await updateDoc(doc(db, 'artifacts', SYNC_ID), { players: ups });
                },

                toggleAllMonitors: async (hide) => {
                    const ups = (gameState.players || []).map(p => ({ ...p, monitorHidden: hide }));
                    await updateDoc(doc(db, 'artifacts', SYNC_ID), { players: ups });
                },

                syncQuestionToAll: async () => {
                    await updateDoc(doc(db, 'artifacts', SYNC_ID), { curQ: teacherPreviewIdx, lastUpdate: Date.now() });
                },

                syncInk: async (force = false) => {
                    const now = Date.now();
                    if(!force && now - lastSyncTime < 300) return;
                    lastSyncTime = now;
                    const c = document.getElementById('writing-canvas');
                    const data = c.toDataURL('image/webp', 0.2);
                    const ups = gameState.players.map(p => { if(p.id === currentPlayerId) p.ink = data; return p; });
                    await updateDoc(doc(db, 'artifacts', SYNC_ID), { players: ups });
                },

                openCollab: (sid, name) => { 
                    collabTargetId = sid; 
                    const me = gameState.players.find(p => p.id === sid);
                    document.getElementById('collab-name').innerText = name; 
                    document.getElementById('collab-modal').classList.remove('hidden'); 
                    document.getElementById('lock-student-btn').innerText = me?.locked ? "解除鎖定" : "鎖定學員畫筆";
                    document.getElementById('collab-lock-info').innerText = me?.locked ? "狀態：畫筆已鎖定" : "狀態：畫筆開放中";
                    window.updateCollabStudentView();
                    window.initCollabCanvas(); 
                },

                updateCollabStudentView: () => {
                    const me = gameState.players.find(p => p.id === collabTargetId);
                    if(!me || !me.ink) return;
                    const img = new Image();
                    img.onload = () => {
                        const c = document.getElementById('collab-student-view'), ctx = c.getContext('2d');
                        ctx.clearRect(0,0,700,700); ctx.drawImage(img, 0,0,700,700); 
                    };
                    img.src = me.ink;
                },

                toggleStudentLock: async () => { 
                    const me = gameState.players.find(p => p.id === collabTargetId);
                    const newLock = !me.locked;
                    const ups = gameState.players.map(p => { if(p.id === collabTargetId) p.locked = newLock; return p; }); 
                    await updateDoc(doc(db, 'artifacts', SYNC_ID), { players: ups }); 
                    document.getElementById('lock-student-btn').innerText = newLock ? "解除鎖定" : "鎖定學員畫筆";
                    document.getElementById('collab-lock-info').innerText = newLock ? "狀態：畫筆已鎖定" : "狀態：畫筆開放中";
                },

                closeCollab: async () => { 
                    const ups = gameState.players.map(p => { if(p.id === collabTargetId) { p.locked = false; p.collabInk = ''; } return p; }); 
                    await updateDoc(doc(db, 'artifacts', SYNC_ID), { players: ups }); 
                    document.getElementById('collab-modal').classList.add('hidden'); 
                    collabTargetId = null; 
                },

                setCollabPen: (c) => { 
                    collabPenColor = c; 
                    ['c-pen-red', 'c-pen-blue', 'c-tool-eraser'].forEach(id => {
                        const btn = document.getElementById(id);
                        const isThis = (id === 'c-pen-red' && c === '#ef4444') || (id === 'c-pen-blue' && c === '#3b82f6') || (id === 'c-tool-eraser' && c === 'eraser');
                        if(btn) btn.classList.toggle('active-tool', isThis);
                    });
                },

                initCollabCanvas: () => { 
                    const c = document.getElementById('collab-canvas'), ctx = c.getContext('2d'); 
                    ctx.lineWidth = 10; ctx.lineCap = 'round'; ctx.clearRect(0,0,700,700); 
                    collabUndoStack = [c.toDataURL()];
                    let dr = false; 
                    const gxy = (e) => {
                        const r = c.getBoundingClientRect();
                        return [(e.clientX - r.left) * (700/r.width), (e.clientY - r.top) * (700/r.height)];
                    };
                    c.onmousedown = (e) => { dr = true; const [x,y] = gxy(e); ctx.beginPath(); ctx.moveTo(x,y); }; 
                    window.onmousemove = (e) => { if(!dr) return; const [x,y] = gxy(e); ctx.globalCompositeOperation = collabPenColor === 'eraser' ? 'destination-out' : 'source-over'; ctx.strokeStyle = collabPenColor; ctx.lineTo(x,y); ctx.stroke(); }; 
                    window.onmouseup = () => { if(dr) { dr = false; collabUndoStack.push(c.toDataURL()); window.syncCollabInk(); } }; 
                },

                syncCollabInk: async () => { 
                    const data = document.getElementById('collab-canvas').toDataURL('image/webp', 0.2); 
                    const ups = gameState.players.map(p => { if(p.id === collabTargetId) p.collabInk = data; return p; }); 
                    await updateDoc(doc(db, 'artifacts', SYNC_ID), { players: ups }); 
                },

                clearStudentInkRemote: async () => {
                    const ups = gameState.players.map(p => { if(p.id === collabTargetId) p.ink = ''; return p; });
                    await updateDoc(doc(db, 'artifacts', SYNC_ID), { players: ups });
                },

                drawRemoteInk: (data) => { 
                    const c = document.getElementById('remote-ink-canvas'), ctx = c.getContext('2d'), img = new Image(); 
                    img.onload = () => { ctx.clearRect(0,0,c.width,c.height); ctx.drawImage(img, 0,0,c.width,c.height); }; 
                    img.src = data; 
                },

                undoCollab: () => {
                    if(collabUndoStack.length <= 1) return;
                    collabUndoStack.pop();
                    const lastImg = collabUndoStack[collabUndoStack.length - 1];
                    const c = document.getElementById('collab-canvas'), ctx = c.getContext('2d');
                    ctx.clearRect(0,0,700,700);
                    if(lastImg) { const img = new Image(); img.onload = () => ctx.drawImage(img, 0, 0); img.src = lastImg; }
                    window.syncCollabInk();
                },

                clearCollabTeacherOnly: () => {
                    document.getElementById('collab-canvas').getContext('2d').clearRect(0,0,700,700);
                    window.syncCollabInk();
                },

                renderQuestionList: () => {
                    if(!gameState || !gameState.questions) return;
                    const container = document.getElementById('question-list');
                    container.innerHTML = gameState.questions.map((q, i) => `
                        <div class="bg-white p-4 rounded-2xl border flex items-center gap-4 mb-2 shadow-sm font-black">
                            <span class="bg-slate-900 text-white px-3 py-1 rounded text-[10px] uppercase font-black italic">${q.type}</span>
                            <span class="flex-1 text-sm italic font-black text-slate-800">${q.content}</span>
                        </div>
                    `).join('');
                },

                startTurn: () => { 
                    const q = gameState.questions[gameState.curQ || 0]; 
                    if(!q) return; 
                    window.currentLocalQ = gameState.curQ;
                    document.getElementById('q-content-text').innerText = q.content; 
                    document.getElementById('q-index-label').innerText = `#${(gameState.curQ+1).toString().padStart(2,'0')}`; 
                    document.getElementById('handwriting-area').classList.remove('hidden'); 
                    window.clearCanvas(); 
                },

                setTool: (t) => { 
                    currentTool = t; 
                    document.getElementById('tool-pen').classList.toggle('active-tool', t==='pen');
                    document.getElementById('tool-eraser').classList.toggle('active-tool', t==='eraser');
                },

                clearCanvas: () => { document.getElementById('writing-canvas').getContext('2d').clearRect(0,0,2000,2000); undoStack = []; window.syncInk(true); },

                undoAction: () => {
                    if(undoStack.length <= 1) return;
                    undoStack.pop();
                    const lastImg = undoStack[undoStack.length - 1];
                    const c = document.getElementById('writing-canvas'), ctx = c.getContext('2d');
                    ctx.clearRect(0, 0, c.width, c.height);
                    if(lastImg) { const img = new Image(); img.onload = () => ctx.drawImage(img, 0, 0, c.width, c.height); img.src = lastImg; }
                    window.syncInk(true);
                },

                handleTeacherInit: async () => {
                    const lobby = gameState?.lobbyPlayers || [];
                    const ps = lobby.map((lp, i) => ({ id: lp.id, name: lp.name, score: 0, bgClass: `bg-indigo-${(i%3+1)*200}`, colorClass: `p-${(i%4)+1}-color`, ink: '', collabInk: '', monitorHidden: false, locked: false }));
                    await updateDoc(doc(db, 'artifacts', SYNC_ID), { status: 'playing', players: ps, curQ: 0, cells: window.generateCells(ps), lastUpdate: Date.now() });
                },

                confirmStudentName: async () => {
                    const name = document.getElementById('user-name-input').value.trim(); if(!name || !user) return;
                    currentPlayerId = user.uid;
                    await updateDoc(doc(db, 'artifacts', SYNC_ID), { lobbyPlayers: arrayUnion({ id: currentPlayerId, name }) });
                    document.getElementById('student-entry-form').classList.add('hidden');
                    document.getElementById('student-wait-hint').classList.remove('hidden');
                },

                togglePause: async () => { await updateDoc(doc(db, 'artifacts', SYNC_ID), { paused: !gameState.paused }); },

                navigateQuestion: (dir) => {
                    const total = gameState.questions.length;
                    teacherPreviewIdx = (teacherPreviewIdx + dir + total) % total;
                    const q = gameState.questions[teacherPreviewIdx];
                    document.getElementById('teacher-hud-q').innerText = `[預覽] ${q.content}`;
                },

                renderMapUI: () => { 
                    [document.getElementById('board-svg-mini'), document.getElementById('board-svg-main')].forEach(svg => { 
                        if(!svg) return; svg.innerHTML = ''; 
                        (gameState?.cells || []).forEach(c => { 
                            const cir = document.createElementNS("http://www.w3.org/2000/svg", "circle"); 
                            cir.setAttribute("cx", c.x); cir.setAttribute("cy", c.y); cir.setAttribute("r", "12"); 
                            const ow = (gameState.players || []).find(p=>p.id===c.owner); cir.setAttribute("fill", ow ? window.getHex(ow.colorClass) : "#cbd5e1"); 
                            cir.classList.add('territory-cell'); svg.appendChild(cir); 
                        }); 
                    }); 
                },

                generateCells: (ps) => { const cells = []; for(let i=0; i<30; i++) { const a = (Math.PI*2/30)*i; const r = 140+Math.random()*90; cells.push({id:i, x:275+r*Math.cos(a), y:275+r*Math.sin(a), owner: ps[i%ps.length]?.id}); } return cells; },
                getHex: (cls) => ({ 'p-1-color': '#ff4d6d', 'p-2-color': '#3b82f6', 'p-3-color': '#10b981', 'p-4-color': '#f59e0b' }[cls] || '#cbd5e1'),
                submitHandwriting: () => { canAttack = true; document.getElementById('attack-modal').classList.remove('hidden'); },
                openFullMap: () => document.getElementById('attack-modal').classList.remove('hidden'),
                isLocked: () => { const me = (gameState.players || []).find(p => p.id === currentPlayerId); return me?.locked || gameState?.paused; },
                copyJoinLink: () => { const el = document.createElement('textarea'); el.value = window.location.href; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); }
            });
        };

        window.mountGlobals();
        (async function boot() { try { const userSnap = await signInAnonymously(auth); user = userSnap.user; lucide.createIcons(); } catch(e) { console.error(e); } })();
    </script>
</body>
</html>
