<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>領地爭奪戰 PRO - 2026 指揮官旗艦版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; color: #0f172a; margin: 0; padding: 0; overflow: hidden; }
        .full-screen-panel { width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; z-index: 50; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* 田字格物理定位系統 */
        .tian-zi-ge { 
            position: fixed; 
            top: 50%; 
            transform: translateY(-50%); 
            background-color: #fff; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 1px solid #e2e8f0;
            z-index: 30;
            transition: width 0.2s, height 0.2s;
        }
        /* 右撇子：物理貼右邊 */
        .edge-right { right: 0 !important; border-right: none !important; border-radius: 3rem 0 0 3rem !important; }
        /* 左撇子：物理貼左邊 */
        .edge-left { left: 0 !important; border-left: none !important; border-radius: 0 3rem 3rem 0 !important; }

        .writing-guide-cross { 
            position: absolute; inset: 0; pointer-events: none; 
            background-image: linear-gradient(to right, transparent 49.5%, #e2e8f0 50%, transparent 50.5%), 
                              linear-gradient(to bottom, transparent 49.5%, #e2e8f0 50%, transparent 50.5%);
        }
        .locked-interaction { pointer-events: none !important; filter: grayscale(1) opacity(0.5); cursor: not-allowed; }
        .btn-active { border: 4px solid #4f46e5 !important; box-shadow: 0 0 15px rgba(79, 70, 229, 0.4); }
        
        .monitor-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .monitor-card.locked { border: 4px solid #f59e0b; box-shadow: 0 0 20px rgba(245, 158, 11, 0.3); }
    </style>
</head>
<body class="bg-slate-50 font-black">

    <div id="entry-screen" class="full-screen-panel bg-slate-900 flex flex-col items-center justify-center p-6 z-[500]">
        <div class="text-center space-y-12 animate-in fade-in zoom-in duration-500">
            <h1 class="text-8xl font-black text-white italic tracking-tighter">領地爭奪 <span class="text-indigo-500">PRO</span></h1>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 px-4 text-slate-900">
                <button onclick="window.switchRole('teacher')" class="group bg-white p-12 rounded-[3rem] hover:bg-indigo-500 hover:text-white transition-all flex flex-col items-center gap-6 shadow-2xl">
                    <i data-lucide="graduation-cap" class="w-24 h-24 text-indigo-500 group-hover:text-white transition-all"></i>
                    <div class="text-4xl font-black italic">我是教師</div>
                </button>
                <button onclick="window.switchRole('student')" class="group bg-white p-12 rounded-[3rem] hover:bg-emerald-500 hover:text-white transition-all flex flex-col items-center gap-6 shadow-2xl">
                    <i data-lucide="sword" class="w-24 h-24 text-emerald-500 group-hover:text-white transition-all"></i>
                    <div class="text-4xl font-black italic">我是學生</div>
                </button>
            </div>
        </div>
    </div>

    <div id="teacher-setup-screen" class="hidden full-screen-panel bg-white flex flex-col z-[400]">
        <header class="p-6 border-b-2 flex justify-between items-center bg-white shadow-sm">
            <h2 class="text-3xl font-black italic text-indigo-600">司令部 LOBBY</h2>
            <div id="lobby-stats" class="bg-indigo-600 text-white px-6 py-2 rounded-full text-sm italic">等待勇者加入...</div>
        </header>
        <div class="flex-1 flex overflow-hidden">
            <div class="w-1/3 p-8 border-r bg-slate-50 space-y-6 overflow-y-auto custom-scrollbar">
                <h3 class="text-xl font-black italic flex items-center gap-2"><i data-lucide="scroll-text" class="text-indigo-600"></i>任務配置清單</h3>
                <div id="question-list" class="space-y-4"></div>
            </div>
            <div class="flex-1 p-8 overflow-y-auto custom-scrollbar bg-white">
                <h3 class="text-xl font-black italic mb-6 flex justify-between">勇者候命區 <span id="lobby-count" class="text-indigo-600">0</span></h3>
                <div id="teacher-lobby-list" class="grid grid-cols-2 gap-4"></div>
            </div>
        </div>
        <div class="p-8 border-t bg-white">
            <button id="start-btn" onclick="window.handleTeacherInit()" class="w-full bg-slate-900 text-white py-6 rounded-3xl text-3xl font-black italic uppercase tracking-widest shadow-2xl disabled:opacity-20 transition-all" disabled>啟動戰鬥指令</button>
        </div>
    </div>

    <div id="player-select-screen" class="hidden full-screen-panel bg-slate-900 flex flex-col items-center justify-center p-6 z-[300]">
        <div class="max-w-md w-full bg-white p-12 rounded-[4rem] shadow-2xl text-center space-y-10 border-[12px] border-slate-800">
            <h2 class="text-4xl font-black italic uppercase">勇者登錄</h2>
            <input type="text" id="user-name-input" maxlength="10" placeholder="輸入您的代號..." class="w-full border-b-4 border-slate-200 p-4 text-center text-3xl font-black outline-none focus:border-indigo-600">
            <div class="grid grid-cols-2 gap-6">
                <button onclick="window.chooseHand('left')" id="hand-left-btn" class="p-6 border-4 border-slate-100 rounded-3xl flex flex-col items-center gap-2 hover:border-indigo-500 transition-all">
                    <i data-lucide="hand" class="w-16 h-16 -scale-x-100"></i>
                    <span class="font-black">左撇子</span>
                </button>
                <button onclick="window.chooseHand('right')" id="hand-right-btn" class="p-6 border-4 border-indigo-500 rounded-3xl flex flex-col items-center gap-2 transition-all bg-indigo-50 text-indigo-600 shadow-xl">
                    <i data-lucide="hand" class="w-16 h-16"></i>
                    <span class="font-black">右撇子</span>
                </button>
            </div>
            <button onclick="window.confirmStudentName()" class="w-full bg-slate-900 text-white py-6 rounded-2xl font-black text-2xl shadow-xl hover:scale-105 transition-transform">確認就位</button>
        </div>
    </div>

    <div id="game-screen" class="hidden full-screen-panel bg-slate-100 flex overflow-hidden">
        <!-- 側邊資訊欄 (1/4) -->
        <div id="sidebar-info" class="w-1/4 bg-white border-r-2 p-6 flex flex-col gap-6 shadow-xl z-50">
            <div id="player-info-card" class="bg-slate-900 p-6 rounded-[2.5rem] text-white shadow-2xl">
                <div class="flex items-center gap-4">
                    <div id="my-color-ball" class="w-16 h-16 rounded-full border-4 border-white/20"></div>
                    <div class="flex-1">
                        <div id="my-name-display" class="text-2xl font-black italic truncate">勇者</div>
                        <div id="my-score-display" class="text-indigo-400 text-sm italic font-black">得分: 0</div>
                    </div>
                </div>
            </div>

            <!-- 教師指揮中心 HUD -->
            <div id="teacher-hud" class="hidden flex-1 flex flex-col gap-4">
                <div class="bg-indigo-900 p-5 rounded-[2.5rem] text-white space-y-4 shadow-xl">
                    <div class="flex justify-between items-center text-xs italic opacity-60">
                        <span><i data-lucide="monitor" class="inline w-3 h-3 mr-1"></i> 指揮面板</span>
                        <span id="t-q-count">載入中</span>
                    </div>
                    <div class="bg-white/10 p-4 rounded-2xl border border-white/10 space-y-4">
                        <div class="flex justify-between items-center text-[10px] opacity-60 italic">
                            <span id="t-q-nav-label">預覽題目 #01</span>
                            <div class="flex gap-2">
                                <button onclick="window.navigatePreview(-1)" class="p-1 hover:bg-white/20 rounded"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
                                <button onclick="window.navigatePreview(1)" class="p-1 hover:bg-white/20 rounded"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>
                            </div>
                        </div>
                        <div id="t-q-preview-text" class="text-sm font-black italic min-h-[40px]">載入內容...</div>
                        <button onclick="window.syncQuestionToAll()" class="w-full bg-indigo-500 py-3 rounded-xl text-xs font-black italic shadow-lg hover:bg-indigo-400 transition-all">同步全體勇者</button>
                    </div>
                    <button id="pause-btn" onclick="window.togglePause()" class="w-full bg-rose-600 py-4 rounded-2xl text-sm font-black italic shadow-lg">暫停全班動作</button>
                    <button onclick="window.toggleAllMonitors(true)" class="w-full bg-slate-800 py-3 rounded-xl text-xs font-black italic">顯示全體畫面</button>
                </div>
            </div>

            <!-- 戰略地圖預覽 -->
            <div class="flex-1 bg-slate-50 rounded-[2.5rem] p-6 border-2 border-white shadow-inner flex flex-col items-center justify-center relative overflow-hidden">
                <h4 class="absolute top-4 text-[10px] font-black text-slate-400 italic">戰略局勢圖 (點擊放大)</h4>
                <div class="w-full max-w-[200px] cursor-zoom-in" onclick="window.openFullMap()">
                    <svg id="board-mini" viewBox="0 0 550 550" class="w-full h-auto drop-shadow-xl"></svg>
                </div>
            </div>
        </div>

        <!-- 主作答區與監控牆 (3/4) -->
        <div id="main-area" class="flex-1 relative bg-slate-100 flex flex-col">
            <!-- 學生作答區 -->
            <div id="student-canvas-area" class="hidden flex-1 flex flex-col p-0 relative">
                <div class="absolute top-8 left-8 z-10 space-y-2">
                    <span id="q-index-tag" class="text-slate-300 text-8xl font-black italic tracking-tighter">#01</span>
                    <div id="player-identity-tag" class="bg-slate-900 text-white px-6 py-2 rounded-full text-xl font-black italic shadow-xl">勇者代號：未命名</div>
                </div>

                <div class="flex-1 flex flex-col items-center justify-center p-0">
                    <div id="q-text-display" class="text-4xl font-black italic text-center max-w-2xl mb-12 leading-tight">任務加載中...</div>
                    
                    <div id="canvas-container-outer" class="relative">
                        <!-- 田字格容器 -->
                        <div id="canvas-container" class="tian-zi-ge w-[500px] h-[500px] edge-right">
                            <div class="writing-guide-cross"></div>
                            <div id="answer-guide" class="absolute inset-0 flex items-center justify-center text-[350px] font-black text-slate-900/10 hidden"></div>
                            <canvas id="main-canvas" width="500" height="500" class="absolute inset-0 z-10 cursor-crosshair touch-none"></canvas>
                            <canvas id="remote-ink-canvas" width="500" height="500" class="absolute inset-0 z-20 pointer-events-none"></canvas>
                        </div>

                        <!-- 浮動工具列 -->
                        <div id="canvas-tools" class="fixed flex flex-col gap-4 z-40" style="bottom: 40px;">
                            <button onclick="window.setTool('pen')" id="btn-pen" class="w-20 h-20 bg-indigo-600 text-white rounded-3xl shadow-xl flex items-center justify-center btn-active"><i data-lucide="pen-tool"></i></button>
                            <button onclick="window.setTool('eraser')" id="btn-eraser" class="w-20 h-20 bg-white text-slate-400 rounded-3xl shadow-xl flex items-center justify-center"><i data-lucide="eraser"></i></button>
                            <button onclick="window.undoAction()" id="btn-undo" class="w-20 h-20 bg-white text-slate-400 rounded-3xl shadow-xl flex items-center justify-center"><i data-lucide="rotate-ccw"></i></button>
                            <button onclick="window.clearCanvas(true)" id="btn-clear" class="w-20 h-20 bg-white text-slate-400 rounded-3xl shadow-xl flex items-center justify-center"><i data-lucide="trash-2"></i></button>
                            <div class="flex gap-2">
                                <button onclick="window.zoomCanvas(0.1)" class="w-9 h-12 bg-slate-800 text-white rounded-xl font-black">+</button>
                                <button onclick="window.zoomCanvas(-0.1)" class="w-9 h-12 bg-slate-800 text-white rounded-xl font-black">-</button>
                            </div>
                            <button onclick="window.submitAnswer()" class="w-20 h-40 bg-emerald-600 text-white rounded-[2.5rem] shadow-2xl flex flex-col items-center justify-center gap-2">
                                <div class="text-3xl font-black">傳</div><div class="text-3xl font-black">送</div>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 教師監控牆 -->
            <div id="teacher-monitor-wall" class="hidden flex-1 p-8 overflow-y-auto custom-scrollbar bg-slate-100">
                <div class="flex justify-between items-center mb-10">
                    <h3 class="text-4xl font-black italic uppercase">戰場即時監控 <span class="text-sm text-indigo-600 ml-4 font-black">LIVE MONITORING</span></h3>
                    <div class="flex gap-4">
                        <button onclick="window.toggleAllMonitors(true)" class="bg-indigo-600 text-white px-8 py-3 rounded-full font-black italic shadow-lg">全部顯示</button>
                        <button onclick="window.toggleAllMonitors(false)" class="bg-slate-800 text-white px-8 py-3 rounded-full font-black italic shadow-lg">全部遮蔽</button>
                    </div>
                </div>
                <div id="monitor-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
            </div>

            <!-- 暫停遮罩 -->
            <div id="pause-overlay" class="hidden absolute inset-0 bg-slate-900/90 z-[100] flex flex-col items-center justify-center text-white">
                <i data-lucide="pause-circle" class="w-32 h-32 mb-8 animate-pulse"></i>
                <div class="text-6xl font-black italic uppercase tracking-tighter">BATTLE ON HOLD</div>
                <div class="text-xl italic mt-4 opacity-60">請等待指揮官恢復權限...</div>
            </div>
        </div>
    </div>

    <div id="collab-modal" class="hidden fixed inset-0 bg-slate-900/98 backdrop-blur-2xl z-[600] flex flex-col items-center justify-center p-8">
        <div class="flex justify-between w-full max-w-6xl mb-8">
            <div class="space-y-1">
                <h2 class="text-5xl font-black text-white italic uppercase">指導模式 <span id="collab-name" class="text-indigo-400 ml-6"></span></h2>
                <div id="collab-lock-info" class="text-amber-400 text-sm italic font-black">狀態：畫筆開放中</div>
            </div>
            <button onclick="window.closeCollab()" class="bg-rose-600 text-white px-10 py-4 rounded-full font-black text-2xl shadow-xl hover:bg-rose-700 transition-all">結束指導</button>
        </div>
        <div class="flex gap-12 items-center justify-center w-full max-w-6xl">
            <div id="collab-box" class="bg-white rounded-3xl shadow-2xl overflow-hidden relative border-[12px] border-slate-700 w-[650px] h-[650px]">
                <img id="collab-bg-ink" class="absolute inset-0 w-full h-full opacity-30 pointer-events-none">
                <canvas id="collab-canvas" width="650" height="650" class="absolute inset-0 z-10 cursor-crosshair"></canvas>
            </div>
            <div class="flex flex-col gap-4 w-56 text-white">
                <button onclick="window.setCollabTool('red')" id="tool-red" class="w-full bg-rose-600 py-8 rounded-3xl font-black text-2xl shadow-lg border-4 border-transparent btn-active">紅筆</button>
                <button onclick="window.setCollabTool('blue')" id="tool-blue" class="w-full bg-blue-600 py-8 rounded-3xl font-black text-2xl shadow-lg border-4 border-transparent">藍筆</button>
                <button onclick="window.setCollabTool('eraser')" id="tool-eraser-collab" class="w-full bg-slate-200 text-slate-800 py-8 rounded-3xl font-black text-2xl">橡皮擦</button>
                <div class="h-4"></div>
                <button onclick="window.undoCollab()" class="w-full bg-slate-800 py-4 rounded-2xl font-black italic">返回上步</button>
                <button onclick="window.clearCollab(true)" class="w-full bg-slate-800 py-4 rounded-2xl font-black italic">清除指導線</button>
                <button onclick="window.clearStudentInkRemote()" class="w-full bg-rose-900/50 text-rose-300 py-4 rounded-2xl font-black italic border border-rose-500/30">一鍵清空學員筆跡</button>
                <div class="h-4"></div>
                <button id="lock-student-btn" onclick="window.toggleBoardLock()" class="w-full bg-amber-600 py-8 rounded-3xl font-black text-2xl shadow-2xl">鎖定學員畫筆</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, updateDoc, onSnapshot, getDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBBIi6sw-wUzp-Jxc3dXJhl5DZ3-6LMe-o", authDomain: "my-handwriting-tool.firebaseapp.com", projectId: "my-handwriting-tool", storageBucket: "my-handwriting-tool.firebasestorage.app", messagingSenderId: "649810632937", appId: "1:649810632937:web:085f7e5c8f5290d6da9078" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const SYNC_ID = 'territory-war-final-2026-fixed';

        let role = null, user = null, gameState = null, currentPlayerId = null;
        let handPref = 'right', currentTool = 'pen', undoStack = [], canvasScale = 1.0;
        let collabTargetId = null, collabTool = 'red', collabUndoStack = [];

        window.mountGlobals = () => {
            Object.assign(window, {
                switchRole: async (r) => {
                    role = r; document.getElementById('entry-screen').classList.add('hidden');
                    if(role === 'teacher') {
                        document.getElementById('teacher-setup-screen').classList.remove('hidden');
                        document.getElementById('teacher-monitor-wall').classList.remove('hidden');
                        document.getElementById('teacher-hud').classList.remove('hidden');
                        const ref = doc(db, 'artifacts', SYNC_ID);
                        const snap = await getDoc(ref);
                        if(!snap.exists()) {
                            await setDoc(ref, { 
                                status: 'lobby', 
                                players: [], 
                                questions: [
                                    { type: 'hand', content: '戰：請寫出挑戰之戰的戰字', ans: '戰' },
                                    { type: 'hand', content: '龍：請寫出飛龍在天的龍字', ans: '龍' }
                                ],
                                curQ: 0, paused: false, showGuide: false
                            });
                        } else {
                            await updateDoc(ref, { status: 'lobby' });
                        }
                    } else {
                        document.getElementById('player-select-screen').classList.remove('hidden');
                    }
                },

                chooseHand: (h) => {
                    handPref = h;
                    const gameScreen = document.getElementById('game-screen');
                    const canvasBox = document.getElementById('canvas-container');
                    const toolBox = document.getElementById('canvas-tools');
                    
                    if(h === 'left') {
                        gameScreen.style.flexDirection = 'row-reverse';
                        canvasBox.className = 'tian-zi-ge edge-left shadow-2xl bg-white w-[500px] h-[500px]';
                        toolBox.style.left = "auto";
                        toolBox.style.right = "520px";
                        document.getElementById('hand-left-btn').className = "p-6 border-4 border-indigo-500 rounded-3xl flex flex-col items-center gap-2 bg-indigo-50 text-indigo-600 shadow-xl";
                        document.getElementById('hand-right-btn').className = "p-6 border-4 border-slate-100 rounded-3xl flex flex-col items-center gap-2";
                    } else {
                        gameScreen.style.flexDirection = 'row';
                        canvasBox.className = 'tian-zi-ge edge-right shadow-2xl bg-white w-[500px] h-[500px]';
                        toolBox.style.right = "auto";
                        toolBox.style.left = "auto";
                        toolBox.style.right = "520px"; // 右撇子工具在格子左邊 (即距離右邊 520px)
                        document.getElementById('hand-right-btn').className = "p-6 border-4 border-indigo-500 rounded-3xl flex flex-col items-center gap-2 bg-indigo-50 text-indigo-600 shadow-xl";
                        document.getElementById('hand-left-btn').className = "p-6 border-4 border-slate-100 rounded-3xl flex flex-col items-center gap-2";
                    }
                    lucide.createIcons();
                },

                confirmStudentName: async () => {
                    const input = document.getElementById('user-name-input');
                    const name = input.value.trim();
                    if(!name || !user) return;
                    currentPlayerId = user.uid;
                    await updateDoc(doc(db, 'artifacts', SYNC_ID), {
                        players: arrayUnion({ id: currentPlayerId, name, ink: '', locked: false, hidden: false, score: 0, collabInk: '' })
                    });
                    document.getElementById('player-select-screen').classList.add('hidden');
                    // 顯示等候畫面
                    const wait = document.createElement('div');
                    wait.id = "student-wait-screen";
                    wait.className = "full-screen-panel bg-slate-900 flex flex-col items-center justify-center text-white z-[250]";
                    wait.innerHTML = `<i data-lucide="clock" class="w-32 h-32 mb-8 animate-pulse text-indigo-400"></i><div class="text-5xl font-black italic">已成功就位</div><div class="mt-4 opacity-50">等待指揮官下達作戰指令...</div>`;
                    document.body.appendChild(wait);
                    lucide.createIcons();
                },

                handleTeacherInit: async () => {
                    await updateDoc(doc(db, 'artifacts', SYNC_ID), { status: 'playing' });
                },

                setTool: (t) => {
                    currentTool = t;
                    document.getElementById('btn-pen').classList.toggle('btn-active', t === 'pen');
                    document.getElementById('btn-eraser').classList.toggle('btn-active', t === 'eraser');
                },

                clearCanvas: (sync = true) => {
                    const c = document.getElementById('main-canvas');
                    c.getContext('2d').clearRect(0,0,c.width,c.height);
                    undoStack = [c.toDataURL()];
                    if(sync) window.syncInk();
                },

                undoAction: () => {
                    if(undoStack.length <= 1) return;
                    undoStack.pop();
                    const img = new Image();
                    img.onload = () => {
                        const c = document.getElementById('main-canvas');
                        const ctx = c.getContext('2d');
                        ctx.clearRect(0,0,c.width,c.height);
                        ctx.drawImage(img, 0,0, c.width, c.height);
                        window.syncInk();
                    };
                    img.src = undoStack[undoStack.length - 1];
                },

                zoomCanvas: (dir) => {
                    const c = document.getElementById('main-canvas');
                    const rc = document.getElementById('remote-ink-canvas');
                    const box = document.getElementById('canvas-container');
                    const img = new Image();
                    img.onload = () => {
                        canvasScale = Math.max(0.6, Math.min(1.6, canvasScale + dir));
                        const size = 500 * canvasScale;
                        box.style.width = size + 'px';
                        box.style.height = size + 'px';
                        c.width = size; c.height = size;
                        rc.width = size; rc.height = size;
                        const ctx = c.getContext('2d');
                        ctx.drawImage(img, 0, 0, size, size);
                        window.initDrawingLogic(); // 重新綁定座標
                    };
                    img.src = c.toDataURL();
                },

                openCollab: (sid, name) => {
                    collabTargetId = sid;
                    const me = gameState.players.find(p => p.id === sid);
                    document.getElementById('collab-name').innerText = name;
                    document.getElementById('collab-bg-ink').src = me.ink || '';
                    document.getElementById('lock-student-btn').innerText = me.locked ? "解除鎖定" : "鎖定學員畫筆";
                    document.getElementById('collab-lock-info').innerText = me.locked ? "狀態：畫筆已鎖定" : "狀態：畫筆開放中";
                    document.getElementById('collab-modal').classList.remove('hidden');
                    window.initCollabCanvas();
                },

                closeCollab: async () => {
                    await updateDoc(doc(db, 'artifacts', SYNC_ID), {
                        players: gameState.players.map(p => {
                            if(p.id === collabTargetId) { p.collabInk = ''; p.locked = false; }
                            return p;
                        })
                    });
                    document.getElementById('collab-modal').classList.add('hidden');
                    collabTargetId = null;
                },

                clearStudentInkRemote: async () => {
                    if(!collabTargetId) return;
                    const ups = gameState.players.map(p => { 
                        if(p.id === collabTargetId) p.ink = ''; 
                        return p; 
                    });
                    await updateDoc(doc(db, 'artifacts', SYNC_ID), { players: ups });
                },

                toggleBoardLock: async () => {
                    const ups = gameState.players.map(p => {
                        if(p.id === collabTargetId) p.locked = !p.locked;
                        return p;
                    });
                    await updateDoc(doc(db, 'artifacts', SYNC_ID), { players: ups });
                },

                togglePause: async () => {
                    await updateDoc(doc(db, 'artifacts', SYNC_ID), { paused: !gameState.paused });
                },

                syncQuestionToAll: async () => {
                    await updateDoc(doc(db, 'artifacts', SYNC_ID), { curQ: window.teacherPreviewIdx });
                }
            });
        };

        window.initDrawingLogic = () => {
            const c = document.getElementById('main-canvas');
            const ctx = c.getContext('2d');
            let drawing = false;
            ctx.lineCap = 'round';
            ctx.lineWidth = 14 * canvasScale;
            ctx.strokeStyle = '#0f172a';

            const getXY = (e) => {
                const rect = c.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return [(clientX - rect.left) / canvasScale, (clientY - rect.top) / canvasScale];
            };

            const start = (e) => {
                if(gameState.paused || gameState.players.find(p=>p.id===currentPlayerId)?.locked) return;
                drawing = true;
                const [x, y] = getXY(e);
                ctx.beginPath(); ctx.moveTo(x * canvasScale, y * canvasScale);
                if(e.touches) e.preventDefault();
            };

            const move = (e) => {
                if(!drawing) return;
                const [x, y] = getXY(e);
                ctx.globalCompositeOperation = currentTool === 'eraser' ? 'destination-out' : 'source-over';
                ctx.lineTo(x * canvasScale, y * canvasScale);
                ctx.stroke();
                if(e.touches) e.preventDefault();
            };

            const stop = () => {
                if(drawing) {
                    drawing = false;
                    undoStack.push(c.toDataURL());
                    window.syncInk();
                }
            };

            c.onmousedown = start; c.ontouchstart = start;
            window.onmousemove = move; window.ontouchmove = move;
            window.onmouseup = stop; window.ontouchend = stop;
        };

        window.syncInk = async () => {
            if(!currentPlayerId) return;
            const ink = document.getElementById('main-canvas').toDataURL('image/webp', 0.2);
            const ups = gameState.players.map(p => { if(p.id === currentPlayerId) p.ink = ink; return p; });
            await updateDoc(doc(db, 'artifacts', SYNC_ID), { players: ups });
        };

        window.initCollabCanvas = () => {
            const c = document.getElementById('collab-canvas');
            const ctx = c.getContext('2d');
            ctx.clearRect(0,0,650,650);
            ctx.lineCap = 'round'; ctx.lineWidth = 10;
            let dr = false;
            c.onmousedown = (e) => {
                dr = true; const r = c.getBoundingClientRect();
                ctx.beginPath(); ctx.moveTo(e.clientX - r.left, e.clientY - r.top);
            };
            c.onmousemove = (e) => {
                if(!dr) return; const r = c.getBoundingClientRect();
                ctx.globalCompositeOperation = collabTool === 'eraser' ? 'destination-out' : 'source-over';
                ctx.strokeStyle = collabTool === 'red' ? '#e11d48' : (collabTool === 'blue' ? '#2563eb' : '#000');
                ctx.lineTo(e.clientX - r.left, e.clientY - r.top); ctx.stroke();
            };
            c.onmouseup = async () => {
                dr = false;
                const ink = c.toDataURL('image/webp', 0.3);
                const ups = gameState.players.map(p => { if(p.id === collabTargetId) p.collabInk = ink; return p; });
                await updateDoc(doc(db, 'artifacts', SYNC_ID), { players: ups });
            };
        };

        window.syncUI = () => {
            const data = gameState;
            if(role === 'teacher') {
                const lobbyList = document.getElementById('teacher-lobby-list');
                const lobbyCount = document.getElementById('lobby-count');
                const startBtn = document.getElementById('start-btn');
                lobbyCount.innerText = data.players.length;
                lobbyList.innerHTML = data.players.map(p => `
                    <div class="bg-white p-6 rounded-3xl border-2 flex items-center justify-between shadow-sm monitor-card ${p.locked ? 'locked' : ''}">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-full bg-slate-900 flex items-center justify-center text-white">${p.name[0]}</div>
                            <div>
                                <div class="font-black">${p.name} ${p.locked ? '🔒' : ''}</div>
                                <div class="text-[10px] text-slate-400">得分: ${p.score}</div>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="window.toggleMonitor('${p.id}')" class="p-2 text-slate-400"><i data-lucide="${p.hidden ? 'eye-off' : 'eye'}"></i></button>
                            <button onclick="window.openCollab('${p.id}', '${p.name}')" class="bg-indigo-50 text-indigo-600 px-4 py-2 rounded-xl text-xs font-black">進入指導</button>
                        </div>
                    </div>`).join('');
                startBtn.disabled = data.players.length === 0;
                
                if(data.status === 'playing') {
                    document.getElementById('teacher-setup-screen').classList.add('hidden');
                    const grid = document.getElementById('monitor-grid');
                    grid.innerHTML = data.players.map(p => `
                        <div class="bg-white p-4 rounded-3xl shadow-lg monitor-card ${p.locked ? 'locked' : ''}">
                            <div class="flex justify-between mb-2">
                                <span class="text-xs font-black italic uppercase">${p.name} ${p.locked ? '🔒' : ''}</span>
                                <button onclick="window.openCollab('${p.id}', '${p.name}')" class="text-[10px] text-indigo-600 font-black">指導</button>
                            </div>
                            <div class="aspect-square bg-slate-50 rounded-xl flex items-center justify-center overflow-hidden border">
                                ${p.hidden ? '<i data-lucide="eye-off" class="text-slate-200 w-12 h-12"></i>' : `<img src="${p.ink}" class="w-full h-full object-contain">`}
                            </div>
                        </div>`).join('');
                    document.getElementById('pause-btn').innerText = data.paused ? "恢復全班作答" : "暫停全班動作";
                    document.getElementById('pause-btn').className = data.paused ? "w-full bg-emerald-600 py-4 rounded-2xl text-sm font-black italic shadow-lg" : "w-full bg-rose-600 py-4 rounded-2xl text-sm font-black italic shadow-lg";
                }
            }

            if(role === 'student' && currentPlayerId) {
                const me = data.players.find(p => p.id === currentPlayerId);
                if(data.status === 'playing') {
                    if(document.getElementById('student-wait-screen')) document.getElementById('student-wait-screen').remove();
                    document.getElementById('game-screen').classList.remove('hidden');
                    document.getElementById('q-index-tag').innerText = `#${(data.curQ + 1).toString().padStart(2, '0')}`;
                    document.getElementById('q-text-display').innerText = data.questions[data.curQ].content;
                    document.getElementById('player-identity-tag').innerText = `勇者代號：${me.name}`;
                    
                    const locked = data.paused || me.locked;
                    document.getElementById('pause-overlay').classList.toggle('hidden', !data.paused);
                    document.getElementById('canvas-tools').classList.toggle('locked-interaction', locked);
                    document.getElementById('main-canvas').classList.toggle('locked-interaction', locked);
                    
                    // 遠端清空與指導筆跡
                    if(me.ink === '' && undoStack.length > 1) {
                        window.clearCanvas(false);
                    }
                    if(me.collabInk) {
                        const tc = document.getElementById('remote-ink-canvas');
                        const tctx = tc.getContext('2d');
                        const img = new Image();
                        img.onload = () => { tctx.clearRect(0,0,tc.width,tc.height); tctx.drawImage(img, 0,0, tc.width, tc.height); };
                        img.src = me.collabInk;
                    } else {
                        document.getElementById('remote-ink-canvas').getContext('2d').clearRect(0,0,500,500);
                    }
                }
            }
            lucide.createIcons();
        };

        window.mountGlobals();
        (async () => {
            const res = await signInAnonymously(auth);
            user = res.user;
            onSnapshot(doc(db, 'artifacts', SYNC_ID), (ds) => {
                if(ds.exists()) {
                    gameState = ds.data();
                    window.syncUI();
                }
            });
            window.initDrawingLogic();
            lucide.createIcons();
        })();
    </script>
</body>
</html>
